<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumlagy - تسجيل الدخول</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { background: white; border-radius: 24px; box-shadow: 0 25px 80px rgba(37,99,235,0.12); width: 100%; max-width: 440px; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 40px 28px; text-align: center; }
        .auth-logo { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 16px; }
        .auth-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .auth-header p { font-size: 14px; opacity: 0.9; }
        .auth-body { padding: 32px 28px; text-align: center; }
        .btn-google { width: 100%; padding: 14px 20px; background: white; color: #1e293b; border: 2px solid #e2e8f0; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin: 12px 0; text-align: center; }
        .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .hidden { display: none; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-footer { text-align: center; padding: 0 28px 28px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-tools"></i></div>
            <h1>Jumlagy</h1>
            <p>نظام إدارة ورشة الصيانة</p>
        </div>
        
        <div class="auth-body">
            <div id="alert-area"></div>
            <div id="login-area">
                <p>اهلاً بك 👋<br>سجل دخولك بحساب جوجل للمتابعة</p>
                <button class="btn-google" id="google-btn" onclick="window.signIn()">
                    <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    تسجيل الدخول بحساب Google
                </button>
            </div>
        </div>
        <div class="auth-footer">Jumlagy © 2026</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRWWLB8X_querXJBIVfhc-yHpi8uSf8",
            authDomain: "jumlagy-erb-45356.firebaseapp.com",
            projectId: "jumlagy-erb-45356",
            storageBucket: "jumlagy-erb-45356.firebasestorage.app",
            messagingSenderId: "105796860104",
            appId: "1:105796860104:web:f1e1f6e167409758e10dfd"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_EMAIL = 'islammurphi@gmail.com'; // ⭐ حساب الأدمن الدائم
        
        const alertArea = document.getElementById('alert-area');
        const loginArea = document.getElementById('login-area');
        
        function showAlert(msg, type) { alertArea.innerHTML = `<div class="alert alert-${type}">${msg}</div>`; }
        
        async function clearOldSession() {
            localStorage.removeItem('jumlagy_session');
            try { await signOut(auth); } catch(e) {}
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                loginArea.innerHTML = `<p>اهلاً بك 👋<br>سجل دخولك بحساب جوجل للمتابعة</p>
                <button class="btn-google" id="google-btn" onclick="window.signIn()">
                    <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    تسجيل الدخول بحساب Google
                </button>`;
                return;
            }
            
            loginArea.innerHTML = '<div class="loading-spinner"></div> جاري التحقق...';
            
            // ⭐⭐⭐ حساب الأدمن: تخطي فحص الاشتراك ⭐⭐⭐
            if (user.email === ADMIN_EMAIL) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    await setDoc(doc(db, "users", user.uid), {
                        name: user.displayName || 'اسم حسن',
                        email: user.email,
                        photo: user.photoURL || '',
                        role: 'admin',
                        created_at: serverTimestamp(),
                        subscription: { plan: 'دائم', status: 'نشط', start_date: '2026-01-01', end_date: '2099-12-31', price: 0 }
                    });
                }
                localStorage.setItem('jumlagy_session', JSON.stringify({ uid: user.uid, name: user.displayName, email: user.email, photo: user.photoURL, role: 'admin', plan: 'دائم', end_date: '2099-12-31' }));
                showAlert('✅ دخول أدمن. جاري التحويل...', 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
                return;
            }
            
            // باقي المستخدمين: فحص الاشتراك عادي
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (!userDoc.exists()) {
                    const trialEnd = new Date(); trialEnd.setDate(trialEnd.getDate() + 3);
                    await setDoc(doc(db, "users", user.uid), { name: user.displayName||'مستخدم', email: user.email, photo: user.photoURL||'', role: 'user', created_at: serverTimestamp(), subscription: { plan: 'تجريبي', status: 'نشط', start_date: new Date().toISOString().split('T')[0], end_date: trialEnd.toISOString().split('T')[0], price: 0 } });
                    localStorage.setItem('jumlagy_session', JSON.stringify({ uid: user.uid, name: user.displayName, email: user.email, photo: user.photoURL, role: 'user', plan: 'تجريبي', end_date: trialEnd.toISOString().split('T')[0] }));
                    showAlert('🎉 3 أيام تجريبية! جاري التحويل...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1500);
                    return;
                }
                
                const userData = userDoc.data();
                const sub = userData.subscription || {};
                const today = new Date();
                const endDate = new Date(sub.end_date);
                
                if (sub.status === 'نشط' && endDate < today) { sub.status = 'منتهي'; await setDoc(doc(db, "users", user.uid), { 'subscription.status': 'منتهي' }, { merge: true }); }
                
                if (sub.status !== 'نشط' || endDate < today) {
                    await signOut(auth); localStorage.removeItem('jumlagy_session');
                    loginArea.innerHTML = `<div style="font-size:50px;">⏰</div><p style="font-weight:700;color:#dc2626;">انتهت صلاحية اشتراكك</p><p style="font-size:14px;color:#64748b;">يرجى تجديد الاشتراك</p><button class="btn-google" onclick="location.reload()">🔄 تحديث</button>`;
                    return;
                }
                
                localStorage.setItem('jumlagy_session', JSON.stringify({ uid: user.uid, name: userData.name, email: user.email, photo: userData.photo, role: userData.role, plan: sub.plan, end_date: sub.end_date }));
                showAlert('✅ دخول ناجح!', 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
            } catch(e) { console.error(e); await signOut(auth); loginArea.innerHTML = `<p style="color:#dc2626;">❌ خطأ</p><button class="btn-google" onclick="location.reload()">🔄 حاول مرة أخرى</button>`; }
        });
        
        window.signIn = async function() {
            const btn = document.getElementById('google-btn');
            if (btn) { btn.disabled = true; btn.innerHTML = '<div class="loading-spinner"></div> جاري...'; }
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                await signInWithPopup(auth, provider);
            } catch(e) {
                loginArea.innerHTML = `<p>اهلاً بك 👋</p><button class="btn-google" onclick="window.signIn()">تسجيل الدخول بحساب Google</button>`;
                if (e.code === 'auth/configuration-not-found') showAlert('❌ Google Sign-In غير مفعل.', 'danger');
                else if (e.code !== 'auth/popup-closed-by-user') showAlert('❌ ' + e.message, 'danger');
            }
        };
        
        clearOldSession();
    </script>
</body>
</html>
