<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumlagy - تسجيل الدخول</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .auth-container { background: white; border-radius: 24px; box-shadow: 0 25px 80px rgba(37,99,235,0.12); width: 100%; max-width: 440px; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 40px 28px; text-align: center; }
        .auth-logo { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 16px; }
        .auth-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .auth-header p { font-size: 14px; opacity: 0.9; }
        
        .auth-body { padding: 32px 28px; text-align: center; }
        .auth-body p { color: #64748b; font-size: 15px; margin-bottom: 24px; line-height: 1.7; }
        
        .btn-google { width: 100%; padding: 14px 20px; background: white; color: #1e293b; border: 2px solid #e2e8f0; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; box-shadow: 0 4px 15px rgba(0,0,0,0.04); transform: translateY(-1px); }
        .btn-google img { width: 22px; height: 22px; }
        
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .hidden { display: none; }
        
        .auth-footer { text-align: center; padding: 0 28px 28px; font-size: 12px; color: #94a3b8; }
        
        .loading-spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-tools"></i></div>
            <h1>Jumlagy</h1>
            <p>نظام إدارة ورشة الصيانة</p>
        </div>
        
        <div class="auth-body">
            <div id="auth-status">
                <!-- مؤشر تحميل -->
                <div id="loading" class="hidden" style="margin-bottom:20px;">
                    <div class="loading-spinner"></div>
                    <p class="text-sm mt-2" style="color:#64748b;">جاري التحقق...</p>
                </div>
                
                <!-- رسائل التنبيه -->
                <div id="auth-alert" class="hidden"></div>
                
                <!-- رسالة الترحيب -->
                <div id="welcome-msg">
                    <p>اهلاً بك في نظام إدارة الورشة 👋<br>سجل دخولك بحساب جوجل للمتابعة</p>
                    <button class="btn-google" onclick="signInWithGoogle()">
                        <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        تسجيل الدخول بحساب Google
                    </button>
                </div>
                
                <!-- رسالة انتهاء الاشتراك -->
                <div id="expired-msg" class="hidden">
                    <div style="font-size:50px;margin-bottom:12px;">⏰</div>
                    <p style="font-weight:700;color:#dc2626;font-size:17px;">انتهت صلاحية اشتراكك</p>
                    <p style="font-size:14px;color:#64748b;margin-top:8px;">يرجى تجديد الاشتراك للاستمرار في استخدام النظام</p>
                    <p style="font-size:13px;color:#94a3b8;margin:12px 0;" id="expired-email"></p>
                    <button class="btn-google" onclick="signInWithGoogle()" style="margin-top:12px;border-color:#dc2626;color:#dc2626;">
                        <i class="fas fa-sync-alt"></i> تجديد الاشتراك
                    </button>
                </div>
            </div>
        </div>
        
        <div class="auth-footer">
            Jumlagy &copy; 2026 · جميع الحقوق محفوظة
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRWWLB8X_querXJBIVfhc-yHpi8uSf8",
            authDomain: "jumlagy-erb-45356.firebaseapp.com",
            projectId: "jumlagy-erb-45356",
            storageBucket: "jumlagy-erb-45356.firebasestorage.app",
            messagingSenderId: "105796860104",
            appId: "1:105796860104:web:f1e1f6e167409758e10dfd",
            measurementId: "G-TFNJSZ0ZKP"
        };
        
        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // عناصر DOM
        const loadingEl = document.getElementById('loading');
        const alertEl = document.getElementById('auth-alert');
        const welcomeMsg = document.getElementById('welcome-msg');
        const expiredMsg = document.getElementById('expired-msg');
        const expiredEmail = document.getElementById('expired-email');
        
        // إظهار/إخفاء التحميل
        function showLoading() { loadingEl.classList.remove('hidden'); welcomeMsg.classList.add('hidden'); expiredMsg.classList.add('hidden'); }
        function showAlert(msg, type) { alertEl.textContent = msg; alertEl.className = `alert alert-${type}`; alertEl.classList.remove('hidden'); }
        
        // التحقق من حالة المستخدم عند فتح الصفحة
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                showLoading();
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (!userDoc.exists()) {
                    // مستخدم جديد - إنشاء حساب مع 3 أيام تجريبية
                    const trialEnd = new Date();
                    trialEnd.setDate(trialEnd.getDate() + 3);
                    
                    await setDoc(doc(db, "users", user.uid), {
                        name: user.displayName || 'مستخدم',
                        email: user.email,
                        photo: user.photoURL || '',
                        role: 'user',
                        created_at: serverTimestamp(),
                        subscription: {
                            plan: 'تجريبي',
                            status: 'نشط',
                            start_date: new Date().toISOString().split('T')[0],
                            end_date: trialEnd.toISOString().split('T')[0],
                            price: 0,
                        }
                    });
                    
                    // حفظ الجلسة والتوجيه للنظام
                    localStorage.setItem('jumlagy_session', JSON.stringify({
                        uid: user.uid,
                        name: user.displayName,
                        email: user.email,
                        photo: user.photoURL,
                        role: 'user',
                        plan: 'تجريبي',
                        end_date: trialEnd.toISOString().split('T')[0],
                    }));
                    
                    showAlert('🎉 تم إنشاء حسابك! لديك 3 أيام تجريبية مجانية.', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1200);
                    return;
                }
                
                const userData = userDoc.data();
                const sub = userData.subscription;
                
                // التحقق من صلاحية الاشتراك
                const today = new Date();
                const endDate = new Date(sub?.end_date);
                
                if (sub?.status !== 'نشط' || endDate < today) {
                    // الاشتراك منتهي
                    if (sub?.status === 'نشط') {
                        await setDoc(doc(db, "users", user.uid), { subscription: { ...sub, status: 'منتهي' } }, { merge: true });
                    }
                    
                    loadingEl.classList.add('hidden');
                    expiredMsg.classList.remove('hidden');
                    expiredEmail.textContent = `حساب: ${user.email}`;
                    return;
                }
                
                // الاشتراك ساري - توجيه للنظام
                localStorage.setItem('jumlagy_session', JSON.stringify({
                    uid: user.uid,
                    name: userData.name || user.displayName,
                    email: user.email,
                    photo: userData.photo || user.photoURL,
                    role: userData.role,
                    plan: sub?.plan,
                    end_date: sub?.end_date,
                }));
                
                showAlert('✅ تم تسجيل الدخول بنجاح! جاري التحويل...', 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
            } else {
                // لا يوجد مستخدم - إظهار زر الدخول
                loadingEl.classList.add('hidden');
                welcomeMsg.classList.remove('hidden');
                expiredMsg.classList.add('hidden');
                alertEl.classList.add('hidden');
            }
        });
        
        // دالة تسجيل الدخول بحساب جوجل
        window.signInWithGoogle = async function() {
            showLoading();
            alertEl.classList.add('hidden');
            
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            
            try {
                await signInWithPopup(auth, provider);
                // سيتم التعامل مع النتيجة في onAuthStateChanged
            } catch (error) {
                console.error(error);
                loadingEl.classList.add('hidden');
                welcomeMsg.classList.remove('hidden');
                
                if (error.code === 'auth/popup-closed-by-user') {
                    showAlert('تم إغلاق نافذة تسجيل الدخول. حاول مرة أخرى.', 'warning');
                } else if (error.code === 'auth/configuration-not-found') {
                    showAlert('❌ خطأ في إعدادات Firebase. تأكد من تفعيل Google Authentication في Firebase Console.', 'danger');
                } else {
                    showAlert('❌ حدث خطأ أثناء تسجيل الدخول: ' + error.message, 'danger');
                }
            }
        };
    </script>
</body>
</html>
