<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumlagy - تسجيل الدخول</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { background: white; border-radius: 24px; box-shadow: 0 25px 80px rgba(37,99,235,0.12); width: 100%; max-width: 440px; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 40px 28px; text-align: center; }
        .auth-logo { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 16px; }
        .auth-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .auth-header p { font-size: 14px; opacity: 0.9; }
        .auth-body { padding: 32px 28px; text-align: center; }
        .btn-google { width: 100%; padding: 14px 20px; background: white; color: #1e293b; border: 2px solid #e2e8f0; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Tajawal', sans-serif; gap: 12px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }
        .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin: 12px 0; text-align: center; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-footer { text-align: center; padding: 0 28px 28px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-tools"></i></div>
            <h1>Jumlagy</h1>
            <p>نظام إدارة ورشة الصيانة</p>
        </div>
        <div class="auth-body">
            <div id="alert-area"></div>
            <div id="login-area">
                <p style="margin-bottom:16px;color:#64748b;">اهلاً بك 👋<br>سجل دخولك بحساب جوجل للمتابعة</p>
                <button class="btn-google" id="google-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    تسجيل الدخول بحساب Google
                </button>
            </div>
        </div>
        <div class="auth-footer">Jumlagy © 2026</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRWWLB8X_querXJBIVfhc-yHpi8uSf8",
            authDomain: "jumlagy-erb-45356.firebaseapp.com",
            projectId: "jumlagy-erb-45356",
            storageBucket: "jumlagy-erb-45356.firebasestorage.app",
            messagingSenderId: "105796860104",
            appId: "1:105796860104:web:f1e1f6e167409758e10dfd"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const ADMIN_EMAILS = ['islammurphi@gmail.com'];
        const alertArea = document.getElementById('alert-area');
        const loginArea = document.getElementById('login-area');
        const googleBtn = document.getElementById('google-btn');
        
        function showAlert(msg, type) {
            if (!alertArea) return;
            alertArea.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => { alertArea.innerHTML = ''; }, 5000);
        }
        
        function isAdmin(user) { return ADMIN_EMAILS.includes(user.email); }
        
        function canAccess(userData) {
            if (userData.role === 'admin' || userData.subscriptionType === 'admin') return true;
            if (userData.status === 'active' && userData.role === 'user') return true;
            if (userData.subscription?.status === 'نشط') return true;
            return false;
        }
        
        function getSessionData(user, userData) {
            return {
                uid: user.uid,
                name: userData.fullName || userData.name || user.displayName || 'مستخدم',
                email: user.email,
                photo: userData.photoURL || userData.avatar || user.photoURL || '',
                role: userData.role || 'user',
                plan: userData.subscriptionType || userData.subscription?.plan || 'مجاني',
                end_date: userData.subscriptionEnd || userData.subscription?.end_date || '2099-12-31',
            };
        }
        
        // ✅ ربط زر تسجيل الدخول
        if (googleBtn) {
            googleBtn.addEventListener('click', async function() {
                googleBtn.disabled = true;
                googleBtn.innerHTML = '<div class="loading-spinner"></div> جاري الاتصال...';
                
                try {
                    const provider = new GoogleAuthProvider();
                    provider.setCustomParameters({ prompt: 'select_account' });
                    await signInWithPopup(auth, provider);
                } catch(e) {
                    googleBtn.disabled = false;
                    googleBtn.innerHTML = 'تسجيل الدخول بحساب Google';
                    
                    if (e.code === 'auth/configuration-not-found') {
                        showAlert('❌ Google Sign-In غير مفعل. روح على Firebase Console > Authentication > Google وفعّله.', 'danger');
                    } else if (e.code !== 'auth/popup-closed-by-user') {
                        showAlert('❌ ' + e.message, 'danger');
                    }
                }
            });
        }
        
        // ✅ مراقبة حالة المصادقة
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                localStorage.removeItem('jumlagy_session');
                return;
            }
            
            loginArea.innerHTML = '<div class="loading-spinner"></div> جاري التحقق...';
            
            try {
                let userDoc = await getDoc(doc(db, "users", user.uid));
                let userData;
                
                if (!userDoc.exists()) {
                    if (isAdmin(user)) {
                        userData = {
                            fullName: user.displayName || 'مدير النظام',
                            name: user.displayName || 'مدير النظام',
                            email: user.email,
                            avatar: user.photoURL || '',
                            photoURL: user.photoURL || '',
                            role: 'admin',
                            status: 'active',
                            subscriptionType: 'admin',
                            subscriptionEnd: '2099-12-31',
                            created_at: serverTimestamp(),
                        };
                    } else {
                        const trialEnd = new Date();
                        trialEnd.setDate(trialEnd.getDate() + 3);
                        userData = {
                            fullName: user.displayName || 'مستخدم جديد',
                            name: user.displayName || 'مستخدم جديد',
                            email: user.email,
                            avatar: user.photoURL || '',
                            photoURL: user.photoURL || '',
                            role: 'user',
                            status: 'active',
                            subscriptionType: 'تجريبي',
                            subscriptionEnd: trialEnd.toISOString().split('T')[0],
                            subscription: { plan: 'تجريبي', status: 'نشط', start_date: new Date().toISOString().split('T')[0], end_date: trialEnd.toISOString().split('T')[0], price: 0 },
                            created_at: serverTimestamp(),
                        };
                    }
                    await setDoc(doc(db, "users", user.uid), userData);
                } else {
                    userData = userDoc.data();
                }
                
                if (!canAccess(userData)) {
                    await signOut(auth);
                    localStorage.removeItem('jumlagy_session');
                    loginArea.innerHTML = '<p style="font-weight:700;color:#dc2626;">انتهت صلاحية اشتراكك</p><p style="color:#64748b;">يرجى التجديد للمتابعة</p><button class="btn-google" onclick="location.reload()">🔄 تحديث الصفحة</button>';
                    return;
                }
                
                localStorage.setItem('jumlagy_session', JSON.stringify(getSessionData(user, userData)));
                showAlert('✅ تم الدخول بنجاح!', 'success');
                setTimeout(() => window.location.href = 'index.html', 800);
                
            } catch(e) {
                console.error(e);
                await signOut(auth);
                localStorage.removeItem('jumlagy_session');
                loginArea.innerHTML = '<p style="color:#dc2626;">❌ خطأ: ' + e.message + '</p><button class="btn-google" onclick="location.reload()">🔄 حاول مرة أخرى</button>';
            }
        });
    </script>
</body>
</html>
