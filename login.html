<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumlagy - تسجيل الدخول</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-container { background: white; border-radius: 24px; box-shadow: 0 25px 80px rgba(37,99,235,0.12); width: 100%; max-width: 440px; overflow: hidden; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .auth-header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 40px 28px; text-align: center; }
        .auth-logo { width: 64px; height: 64px; background: rgba(255,255,255,0.2); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 16px; }
        .auth-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
        .auth-header p { font-size: 14px; opacity: 0.9; }
        .auth-body { padding: 32px 28px; text-align: center; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-google { width: 100%; padding: 14px 20px; background: white; color: #1e293b; border: 2px solid #e2e8f0; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.3s; margin-top: 16px; }
        .btn-google:hover { background: #f8fafc; border-color: #2563eb; box-shadow: 0 4px 15px rgba(37,99,235,0.15); transform: translateY(-2px); }
        .btn-google:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin: 12px 0; text-align: center; width: 100%; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-danger { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert-warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.6s linear infinite; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-footer { text-align: center; padding: 0 28px 28px; font-size: 12px; color: #94a3b8; }
        .hidden { display: none; }
    </style>
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-tools"></i></div>
            <h1>Jumlagy</h1>
            <p>نظام إدارة ورشة الصيانة</p>
        </div>
        <div class="auth-body">
            <div id="alert-area"></div>
            <div id="login-area">
                <p style="color:#64748b;">اهلاً بك 👋<br>سجل دخولك بحساب جوجل للمتابعة</p>
                <button class="btn-google" id="google-btn">
                    <svg width="22" height="22" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    تسجيل الدخول بحساب Google
                </button>
            </div>
        </div>
        <div class="auth-footer">Jumlagy © 2026</div>
    </div>

    <script type="module">
        // ================================
        // 🔥 استيراد Firebase
        // ================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        
        // ================================
        // 🔥 تكوين Firebase
        // ================================
        const firebaseConfig = {
            apiKey: "AIzaSyAuCRWWLB8X_querXJBIVfhc-yHpi8uSf8",
            authDomain: "jumlagy-erb-45356.firebaseapp.com",
            projectId: "jumlagy-erb-45356",
            storageBucket: "jumlagy-erb-45356.firebasestorage.app",
            messagingSenderId: "105796860104",
            appId: "1:105796860104:web:f1e1f6e167409758e10dfd"
        };
        
        // ================================
        // 🔥 تهيئة Firebase
        // ================================
        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            console.log('✅ Firebase initialized successfully');
        } catch (error) {
            console.error('❌ Firebase initialization failed:', error);
            document.getElementById('login-area').innerHTML = 
                `<div class="alert alert-danger">❌ فشل الاتصال بقاعدة البيانات. تأكد من اتصالك بالإنترنت.</div>
                <button class="btn-google" onclick="location.reload()">🔄 تحديث الصفحة</button>`;
        }
        
        const ADMIN_EMAILS = ['islammurphi@gmail.com'];
        const alertArea = document.getElementById('alert-area');
        const loginArea = document.getElementById('login-area');
        
        function showAlert(msg, type) {
            if (alertArea) {
                alertArea.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
                setTimeout(() => { alertArea.innerHTML = ''; }, 5000);
            }
        }
        
        // ================================
        // 🔥 مسح الجلسة القديمة فوراً
        // ================================
        async function clearOldSession() {
            console.log('🧹 Clearing old session...');
            localStorage.removeItem('jumlagy_session');
            sessionStorage.clear();
            try { 
                await signOut(auth); 
            } catch(e) {
                console.log('No user to sign out');
            }
        }
        
        function isAdmin(user) { 
            return ADMIN_EMAILS.includes(user.email); 
        }
        
        function canAccess(userData) {
            if (userData.role === 'admin' || userData.subscriptionType === 'admin') return true;
            if (userData.status === 'active' && userData.role === 'user') return true;
            if (userData.subscription?.status === 'نشط') {
                const endDate = new Date(userData.subscription.end_date);
                if (endDate >= new Date()) return true;
            }
            return false;
        }
        
        function getSessionData(user, userData) {
            return {
                uid: user.uid,
                name: userData.fullName || userData.name || user.displayName || 'مستخدم',
                email: user.email,
                photo: userData.photoURL || userData.avatar || user.photoURL || '',
                role: userData.role || 'user',
                plan: userData.subscriptionType || userData.subscription?.plan || 'مجاني',
                end_date: userData.subscriptionEnd || userData.subscription?.end_date || '2099-12-31',
            };
        }
        
        // ================================
        // 🔥 دالة تسجيل الدخول
        // ================================
        async function signIn() {
            const btn = document.getElementById('google-btn');
            if (!btn) return;
            
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div> جاري الاتصال...';
            
            try {
                console.log('🔄 Starting Google Sign-In...');
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                
                const result = await signInWithPopup(auth, provider);
                console.log('✅ Sign-In successful:', result.user.email);
                
                // سيتم معالجة باقي الخطوات في onAuthStateChanged
                
            } catch (error) {
                console.error('❌ Sign-In error:', error.code, error.message);
                btn.disabled = false;
                btn.innerHTML = 'تسجيل الدخول بحساب Google';
                
                switch(error.code) {
                    case 'auth/configuration-not-found':
                        showAlert('❌ Google Sign-In غير مفعل. روح على Firebase Console > Authentication > Google وفعّله.', 'danger');
                        break;
                    case 'auth/popup-closed-by-user':
                        showAlert('ℹ️ تم إغلاق نافذة تسجيل الدخول', 'warning');
                        break;
                    case 'auth/popup-blocked':
                        showAlert('⚠️ الرجاء السماح بالنوافذ المنبثقة للموقع', 'warning');
                        break;
                    case 'auth/unauthorized-domain':
                        showAlert('❌ هذا الدومين غير مصرح به في Firebase. أضفه في Firebase Console > Authentication > Settings > Authorized domains', 'danger');
                        break;
                    default:
                        showAlert('❌ خطأ: ' + error.message, 'danger');
                }
            }
        }
        
        // ================================
        // 🔥 مراقبة حالة المصادقة
        // ================================
        onAuthStateChanged(auth, async (user) => {
            console.log('🔍 Auth state changed:', user ? user.email : 'No user');
            
            if (!user) {
                // لا يوجد مستخدم - إظهار زر تسجيل الدخول
                loginArea.innerHTML = `
                    <p style="color:#64748b;">اهلاً بك 👋<br>سجل دخولك بحساب جوجل للمتابعة</p>
                    <button class="btn-google" id="google-btn">
                        <svg width="22" height="22" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        تسجيل الدخول بحساب Google
                    </button>`;
                
                // إعادة ربط زر تسجيل الدخول
                setTimeout(() => {
                    const newBtn = document.getElementById('google-btn');
                    if (newBtn) newBtn.addEventListener('click', signIn);
                }, 100);
                
                return;
            }
            
            // 🔥 مستخدم مسجل دخول - جاري التحقق...
            loginArea.innerHTML = `
                <div class="loading-spinner"></div>
                <p style="color:#64748b;">جاري التحقق من حسابك...</p>`;
            
            try {
                console.log('📂 Fetching user data from Firestore...');
                let userDoc = await getDoc(doc(db, "users", user.uid));
                let userData;
                
                if (!userDoc.exists()) {
                    console.log('📝 Creating new user document...');
                    
                    if (isAdmin(user)) {
                        // إنشاء حساب مدير
                        userData = {
                            fullName: user.displayName || 'مدير النظام',
                            name: user.displayName || 'مدير النظام',
                            email: user.email,
                            avatar: user.photoURL || '',
                            photoURL: user.photoURL || '',
                            role: 'admin',
                            status: 'active',
                            subscriptionType: 'admin',
                            subscriptionEnd: '2099-12-31',
                            created_at: serverTimestamp(),
                        };
                    } else {
                        // إنشاء حساب تجريبي
                        const trialEnd = new Date();
                        trialEnd.setDate(trialEnd.getDate() + 3);
                        userData = {
                            fullName: user.displayName || 'مستخدم جديد',
                            name: user.displayName || 'مستخدم جديد',
                            email: user.email,
                            avatar: user.photoURL || '',
                            photoURL: user.photoURL || '',
                            role: 'user',
                            status: 'active',
                            subscriptionType: 'تجريبي',
                            subscriptionEnd: trialEnd.toISOString().split('T')[0],
                            subscription: {
                                plan: 'تجريبي',
                                status: 'نشط',
                                start_date: new Date().toISOString().split('T')[0],
                                end_date: trialEnd.toISOString().split('T')[0],
                                price: 0
                            },
                            created_at: serverTimestamp(),
                        };
                    }
                    
                    // حفظ المستخدم الجديد
                    await setDoc(doc(db, "users", user.uid), userData);
                    console.log('✅ New user created:', user.email);
                    
                } else {
                    userData = userDoc.data();
                    console.log('✅ Existing user found:', user.email);
                    
                    // التحقق من انتهاء الاشتراك للمستخدمين العاديين
                    if (userData.role !== 'admin') {
                        const endDate = new Date(userData.subscriptionEnd || userData.subscription?.end_date || '2000-01-01');
                        if (endDate < new Date()) {
                            userData.status = 'expired';
                            userData.subscriptionType = 'منتهي';
                            if (userData.subscription) userData.subscription.status = 'منتهي';
                            
                            await setDoc(doc(db, "users", user.uid), { 
                                status: 'expired', 
                                subscriptionType: 'منتهي',
                                'subscription.status': 'منتهي' 
                            }, { merge: true });
                        }
                    }
                }
                
                // التحقق من صلاحية الوصول
                if (!canAccess(userData)) {
                    console.log('⛔ Access denied - subscription expired');
                    await signOut(auth);
                    localStorage.removeItem('jumlagy_session');
                    
                    loginArea.innerHTML = `
                        <div style="font-size:50px;">⏰</div>
                        <p style="font-weight:700;color:#dc2626;">انتهت صلاحية اشتراكك</p>
                        <p style="color:#64748b;">يرجى التجديد للمتابعة</p>
                        <button class="btn-google" onclick="location.reload()">🔄 تحديث الصفحة</button>`;
                    return;
                }
                
                // حفظ الجلسة
                const sessionData = getSessionData(user, userData);
                localStorage.setItem('jumlagy_session', JSON.stringify(sessionData));
                console.log('💾 Session saved:', sessionData);
                
                showAlert('✅ تم تسجيل الدخول بنجاح!', 'success');
                
                // التحويل للوحة التحكم
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
                
            } catch (error) {
                console.error('❌ Error in auth state change:', error);
                loginArea.innerHTML = `
                    <div class="alert alert-danger">❌ حدث خطأ: ${error.message}</div>
                    <button class="btn-google" onclick="location.reload()">🔄 حاول مرة أخرى</button>`;
            }
        });
        
        // ================================
        // 🔥 بدء التشغيل
        // ================================
        console.log('🚀 Starting login page...');
        clearOldSession();
        
        // ربط زر تسجيل الدخول
        document.addEventListener('DOMContentLoaded', () => {
            const googleBtn = document.getElementById('google-btn');
            if (googleBtn) {
                googleBtn.addEventListener('click', signIn);
                console.log('✅ Google button event attached');
            }
        });
    </script>
</body>
</html>
