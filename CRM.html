<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة العملاء | V6 النسخة الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js">
    </script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-rgb: 99, 102, 241;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --success-rgb: 16, 185, 129;
            --warning: #f59e0b;
            --warning-rgb: 245, 158, 11;
            --danger: #ef4444;
            --danger-rgb: 239, 68, 68;
            --info: #06b6d4;
            --info-rgb: 6, 182, 212;
            --pink: #ec4899;
            --pink-rgb: 236, 72, 153;
            --orange: #f97316;
            --orange-rgb: 249, 115, 22;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --bg-hover: #f8fafc;
            --bg-accent: #eef2ff;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --text: #1e293b;
            --text-secondary: #475569;
            --text-light: #94a3b8;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.12);
            --radius-xs: 6px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-2xl: 32px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-xs: 0.7rem;
            --font-sm: 0.78rem;
            --font-base: 0.85rem;
            --font-md: 0.92rem;
            --font-lg: 1.1rem;
            --font-xl: 1.4rem;
            --font-2xl: 1.8rem;
        }
        body.dark {
            --bg-body: #0a0f1a;
            --bg-card: #111827;
            --bg-hover: #1a2236;
            --bg-accent: #1e293b;
            --border: #1e293b;
            --border-light: #263348;
            --text: #e2e8f0;
            --text-secondary: #cbd5e1;
            --text-light: #94a3b8;
            --shadow-xs: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.5);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.6);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            transition: background 0.3s ease, color 0.3s ease;
            line-height: 1.6;
            font-size: var(--font-base);
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1440px; margin: 0 auto; width: 100%; }
        .header {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3);
        }
        .logo h1 { font-size: var(--font-lg); font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
        .logo span { font-size: var(--font-xs); color: var(--text-light); display: block; font-weight: 500; }
        .nav-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .nav-btn {
            padding: 8px 15px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-weight: 600;
            font-size: var(--font-sm);
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: all var(--transition);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }
        .nav-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .nav-btn.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.4); }
        .stats-strip {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            padding: 14px;
        }
        .strip-section { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center; }
        .strip-divider { height: 1px; background: var(--border-light); width: 100%; }
        .mini-chip {
            padding: 5px 12px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-weight: 600;
            font-size: var(--font-xs);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            background: var(--bg-card);
            user-select: none;
        }
        .mini-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .mini-chip.active { color: white; transform: scale(1.04); }
        .mini-chip .mini-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .mini-chip .mini-count { font-size: 0.65rem; opacity: 0.85; font-weight: 500; }
        .btn {
            padding: 8px 16px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            font-size: var(--font-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all var(--transition);
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 15px rgba(var(--primary-rgb), 0.3); }
        .btn-primary:hover { box-shadow: 0 8px 25px rgba(var(--primary-rgb), 0.45); transform: translateY(-2px); }
        .btn-success { background: linear-gradient(135deg, var(--success), #0d9488); color: white; box-shadow: 0 4px 15px rgba(var(--success-rgb), 0.3); }
        .btn-success:hover { box-shadow: 0 8px 25px rgba(var(--success-rgb), 0.45); transform: translateY(-2px); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; box-shadow: 0 4px 15px rgba(var(--danger-rgb), 0.3); }
        .btn-outline { background: var(--bg-card); border: 1.5px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--bg-accent); }
        .filters-section { background: var(--bg-card); border-radius: var(--radius-xl); padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { flex: 1 1 100%; min-width: 100%; margin-bottom: 8px; }
        .filter-group label { display: block; font-size: var(--font-xs); font-weight: 700; margin-bottom: 4px; color: var(--text-light); }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 8px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            font-size: var(--font-sm);
            transition: all var(--transition);
        }
        .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.08); background: var(--bg-card); }
        .multi-select-container { position: relative; width: 100%; }
        .multi-select-display {
            width: 100%;
            padding: 8px 14px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            font-size: var(--font-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            min-height: 40px;
            transition: all var(--transition);
        }
        .multi-select-display:hover { border-color: var(--primary); }
        .multi-select-tag {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.68rem;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(var(--primary-rgb), 0.2);
        }
        .multi-select-tag .remove-tag { cursor: pointer; font-size: 0.65rem; opacity: 0.8; font-weight: bold; transition: opacity var(--transition); }
        .multi-select-tag .remove-tag:hover { opacity: 1; }
        .multi-select-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            z-index: 200;
            max-height: 220px;
            overflow-y: auto;
        }
        .multi-select-dropdown.show { display: block; animation: fadeInDown 0.2s ease; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .multi-select-option {
            padding: 9px 14px;
            cursor: pointer;
            font-size: var(--font-sm);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background var(--transition);
            border-bottom: 1px solid var(--border-light);
            font-weight: 500;
        }
        .multi-select-option:last-child { border-bottom: none; }
        .multi-select-option:hover { background: var(--bg-accent); }
        .multi-select-option input[type="checkbox"] { accent-color: var(--primary); width: 17px; height: 17px; cursor: pointer; }
        .search-box { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .search-box input {
            flex: 1 1 100%;
            min-width: 180px;
            padding: 9px 16px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            transition: all var(--transition);
            font-size: var(--font-sm);
        }
        .search-box input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.08); background: var(--bg-card); }
        .table-wrapper {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }
        table { width: 100%; min-width: 1000px; border-collapse: collapse; font-size: var(--font-sm); }
        th {
            padding: 11px 8px;
            background: var(--bg-body);
            font-weight: 700;
            font-size: 0.7rem;
            text-align: center;
            border-bottom: 2px solid var(--border);
            color: var(--text-secondary);
            white-space: nowrap;
            user-select: none;
            position: sticky;
            top: 0;
            z-index: 10;
            cursor: grab;
        }
        th:active { cursor: grabbing; }
        th.drag-over { border-right: 3px solid var(--primary); background: rgba(var(--primary-rgb), 0.05); }
        th .resize-handle { position: absolute; top: 0; left: 0; width: 5px; height: 100%; cursor: col-resize; z-index: 20; }
        th .resize-handle:hover { background: var(--primary); opacity: 0.4; }
        td { padding: 9px 6px; text-align: center; border-bottom: 1px solid var(--border-light); font-size: var(--font-sm); transition: background 0.15s ease; vertical-align: middle; }
        tr:hover td { background: var(--bg-accent); }
        .empty-row td { padding: 50px 20px; color: var(--text-light); font-size: var(--font-base); text-align: center; }
        .inline-input, .inline-select {
            background: transparent;
            border: 1.5px solid transparent;
            border-radius: var(--radius-xs);
            padding: 5px 8px;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-size: var(--font-sm);
            text-align: center;
            color: var(--text);
            transition: all var(--transition);
            min-width: 60px;
        }
        .inline-input:hover, .inline-select:hover { border-color: var(--border); background: var(--bg-body); }
        .inline-input:focus, .inline-select:focus { outline: none; border-color: var(--primary); background: var(--bg-card); box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.06); }
        .inline-select { cursor: pointer; }
        textarea.inline-input { resize: vertical; min-height: 35px; max-height: 120px; text-align: right; line-height: 1.4; }
        .action-icons { display: flex; gap: 4px; justify-content: center; }
        .action-icons i { padding: 7px; border-radius: var(--radius-xs); cursor: pointer; transition: all var(--transition); font-size: 0.8rem; }
        .action-icons i.fa-edit { color: var(--primary); background: rgba(var(--primary-rgb), 0.08); }
        .action-icons i.fa-edit:hover { background: rgba(var(--primary-rgb), 0.18); transform: scale(1.1); }
        .action-icons i.fa-trash-alt { color: var(--danger); background: rgba(var(--danger-rgb), 0.08); }
        .action-icons i.fa-trash-alt:hover { background: rgba(var(--danger-rgb), 0.18); transform: scale(1.1); }
        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-decoration: none;
            transition: all var(--transition);
            box-shadow: 0 3px 10px rgba(37, 211, 102, 0.3);
            font-size: 0.85rem;
        }
        .whatsapp-link:hover { transform: scale(1.15); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5); }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            justify-content: center;
            align-items: flex-start;
            z-index: 1000;
            padding: 12px;
            overflow-y: auto;
        }
        .modal-content {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-xl);
            padding: 20px;
            box-shadow: var(--shadow-xl);
            animation: slideUp 0.25s ease;
            margin: auto;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 700; font-size: var(--font-sm); color: var(--text); }
        .form-group label .required { color: var(--danger); margin-right: 3px; }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            font-family: 'Cairo', sans-serif;
            background: var(--bg-body);
            color: var(--text);
            transition: all var(--transition);
            font-size: var(--font-sm);
        }
        .modal-content input:focus, .modal-content select:focus, .modal-content textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.08); background: var(--bg-card); }
        .flex-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }
        .flex-btns .btn { min-width: 100px; justify-content: center; flex: 1 1 auto; }

        /* ====== Professional Reports Dashboard ====== */
        .reports-hero {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .report-kpi {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 16px 14px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .report-kpi:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .report-kpi::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }
        .report-kpi.kpi-primary::after { background: var(--primary); }
        .report-kpi.kpi-success::after { background: var(--success); }
        .report-kpi.kpi-warning::after { background: var(--warning); }
        .report-kpi.kpi-info::after { background: var(--info); }
        .report-kpi.kpi-pink::after { background: var(--pink); }
        .report-kpi.kpi-orange::after { background: var(--orange); }
        .report-kpi .kpi-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .report-kpi .kpi-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .report-kpi .kpi-title { font-size: var(--font-xs); color: var(--text-light); font-weight: 600; }
        .report-kpi .kpi-value { font-size: var(--font-2xl); font-weight: 900; color: var(--text); line-height: 1; }
        .report-kpi .kpi-subtitle { font-size: 0.65rem; color: var(--text-light); margin-top: 2px; }
        .report-kpi .kpi-progress { margin-top: 8px; height: 4px; background: var(--border-light); border-radius: 10px; overflow: hidden; }
        .report-kpi .kpi-progress-bar { height: 100%; border-radius: 10px; transition: width 0.6s ease; }

        .reports-charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .reports-chart-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .reports-chart-card h4 {
            font-size: var(--font-sm);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-weight: 700;
        }
        .reports-chart-card canvas { max-height: 220px; }

        .reports-detail-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .reports-detail-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .reports-detail-card h4 {
            font-size: var(--font-sm);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-weight: 700;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-light);
        }
        .reports-detail-table { width: 100%; border-collapse: collapse; font-size: var(--font-sm); }
        .reports-detail-table th { background: var(--bg-body); padding: 10px 12px; font-weight: 700; font-size: 0.7rem; color: var(--text-light); position: static; white-space: nowrap; }
        .reports-detail-table td { padding: 9px 12px; border-bottom: 1px solid var(--border-light); font-weight: 500; white-space: nowrap; }
        .reports-detail-table tr:last-child td { border-bottom: none; }
        .reports-detail-table tr:hover td { background: var(--bg-hover); }

        .settings-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .settings-card { background: var(--bg-card); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .settings-card h3 { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: var(--font-md); padding-bottom: 10px; border-bottom: 2px solid var(--border-light); font-weight: 700; }
        .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-radius: var(--radius-sm); margin-bottom: 4px; transition: all var(--transition); background: var(--bg-body); gap: 8px; }
        .settings-item:hover { background: var(--bg-accent); box-shadow: var(--shadow-xs); }
        .settings-add { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
        .settings-add input { flex: 1 1 130px; padding: 8px 12px; border-radius: 50px; border: 1.5px solid var(--border); font-family: 'Cairo', sans-serif; background: var(--bg-body); color: var(--text); font-size: var(--font-sm); }
        .settings-add input:focus { outline: none; border-color: var(--primary); }
        .toast-container { position: fixed; bottom: 16px; left: 16px; right: 16px; z-index: 3000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { padding: 11px 18px; border-radius: 50px; color: white; font-size: var(--font-sm); animation: slideInRight 0.35s ease; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-lg); font-weight: 600; pointer-events: auto; }
        .toast-success { background: linear-gradient(135deg, var(--success), #0d9488); }
        .toast-error { background: linear-gradient(135deg, var(--danger), #dc2626); }
        @keyframes slideInRight { from { transform: translateX(-120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (min-width: 640px) {
            body { padding: 16px; }
            .header { padding: 16px 22px; flex-wrap: nowrap; }
            .stats-strip { flex-direction: row; padding: 10px 16px; gap: 0; }
            .strip-divider { height: auto; width: 1px; }
            .strip-section { flex: 1; }
            .filter-group { flex: 1 1 150px; min-width: 150px; margin-bottom: 0; }
            .search-box input { flex: 2 1 200px; }
            .reports-hero { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .reports-charts-grid { grid-template-columns: repeat(3, 1fr); }
            .reports-detail-grid { grid-template-columns: repeat(2, 1fr); }
            .settings-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        }
        @media (min-width: 1024px) {
            body { padding: 24px; }
            .header { padding: 18px 28px; border-radius: var(--radius-2xl); }
            .logo-icon { width: 48px; height: 48px; font-size: 1.4rem; }
            .logo h1 { font-size: var(--font-xl); }
            .nav-btn { padding: 9px 18px; font-size: var(--font-base); }
            .mini-chip { font-size: var(--font-xs); padding: 6px 14px; }
            th { font-size: 0.76rem; padding: 14px 10px; }
            td { font-size: var(--font-base); padding: 10px 8px; }
            .reports-hero { grid-template-columns: repeat(6, 1fr); gap: 14px; }
            .reports-chart-card canvas { max-height: 250px; }
            .report-kpi .kpi-value { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-users"></i></div>
                <div><h1>نظام متابعة العملاء</h1><span>إدارة متكاملة | V6 Pro</span></div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="homeNavBtn"><i class="fas fa-table"></i> الرئيسية</button>
                <button class="nav-btn" id="reportsNavBtn"><i class="fas fa-chart-bar"></i> لوحة التحليل</button>
                <button class="nav-btn" id="settingsNavBtn"><i class="fas fa-cog"></i> إعدادات</button>
                <button class="nav-btn" id="darkModeBtn" title="الوضع الداكن"><i class="fas fa-moon"></i></button>
            </div>
        </div>

        <div id="mainPage">
            <div class="stats-strip" id="statsStrip"></div>
            <div style="display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;">
                <button class="btn btn-primary" id="addCustomerBtn"><i class="fas fa-plus"></i> عميل جديد</button>
                <button class="btn btn-success" id="importExcelBtn"><i class="fas fa-file-import"></i> استيراد Excel</button>
            </div>
            <div class="filters-section">
                <div class="filter-row">
                    <div class="filter-group"><label>المخزن</label><div class="multi-select-container" id="storeMultiSelect"><div class="multi-select-display" id="storeDisplay"><span style="color:var(--text-light);">كل المخازن</span></div><div class="multi-select-dropdown" id="storeDropdown"></div></div></div>
                    <div class="filter-group"><label>حالة المتابعة</label><select id="filterFollowSelect"><option value="">كل الحالات</option></select></div>
                    <div class="filter-group"><label>التقييم</label><select id="filterRatingSelect"><option value="">كل التقييمات</option></select></div>
                    <div class="filter-group"><label>تاريخ من</label><input type="date" id="filterDateFrom"></div>
                    <div class="filter-group"><label>تاريخ إلى</label><input type="date" id="filterDateTo"></div>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 بحث بالاسم أو رقم الهاتف...">
                    <button class="btn btn-outline" id="clearFiltersBtn"><i class="fas fa-undo"></i> إعادة ضبط</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="customerTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
            </div>
        </div>

        <div id="reportsPage" style="display:none;">
            <div style="margin-bottom:14px; display:flex; gap:6px; flex-wrap:wrap; justify-content:space-between; align-items:center;">
                <button class="btn btn-outline" id="backFromReports"><i class="fas fa-arrow-right"></i> رجوع للرئيسية</button>
                <div style="display:flex; gap:6px;"><button class="btn btn-success" id="exportExcel"><i class="fas fa-file-excel"></i> تصدير Excel</button><button class="btn btn-danger" id="exportPDFBtn"><i class="fas fa-file-pdf"></i> تصدير PDF</button></div>
            </div>
            <div class="filters-section">
                <div class="filter-row">
                    <div class="filter-group"><label>المخزن</label><select id="reportStoreFilter"><option value="">كل المخازن</option></select></div>
                    <div class="filter-group"><label>حالة المتابعة</label><select id="reportFollowFilter"><option value="">كل الحالات</option></select></div>
                    <div class="filter-group"><label>التقييم</label><select id="reportRatingFilter"><option value="">كل التقييمات</option></select></div>
                    <div class="filter-group"><label>تاريخ من</label><input type="date" id="reportDateFrom"></div>
                    <div class="filter-group"><label>تاريخ إلى</label><input type="date" id="reportDateTo"></div>
                    <div class="filter-group" style="display:flex; align-items:flex-end;"><button class="btn btn-outline" id="resetReportFiltersBtn"><i class="fas fa-undo"></i> إعادة ضبط</button></div>
                </div>
            </div>
            <div class="reports-hero" id="reportsHero"></div>
            <div class="reports-charts-grid">
                <div class="reports-chart-card"><h4><i class="fas fa-chart-pie" style="color:var(--primary);"></i> توزيع المخازن</h4><canvas id="chartStores" height="220"></canvas></div>
                <div class="reports-chart-card"><h4><i class="fas fa-chart-bar" style="color:var(--success);"></i> حالات المتابعة</h4><canvas id="chartFollow" height="220"></canvas></div>
                <div class="reports-chart-card"><h4><i class="fas fa-star" style="color:var(--warning);"></i> التقييمات</h4><canvas id="chartRatings" height="220"></canvas></div>
            </div>
            <div class="reports-detail-grid" id="reportsDetailGrid"></div>
        </div>

        <div id="settingsPage" style="display:none;">
            <div style="margin-bottom:12px;"><button class="btn btn-outline" id="backFromSettings"><i class="fas fa-arrow-right"></i> رجوع للرئيسية</button></div>
            <div class="settings-grid">
                <div class="settings-card"><h3><i class="fas fa-warehouse" style="color:var(--primary);"></i> المخازن</h3><div id="storesList"></div><div class="settings-add"><input type="text" id="newStore" placeholder="اسم المخزن الجديد"><button class="btn btn-primary" id="addStoreBtn"><i class="fas fa-plus"></i> إضافة</button></div></div>
                <div class="settings-card"><h3><i class="fas fa-star" style="color:var(--warning);"></i> التقييمات</h3><div id="ratingsList"></div><div class="settings-add"><input type="text" id="newRating" placeholder="تقييم جديد"><button class="btn btn-primary" id="addRatingBtn"><i class="fas fa-plus"></i> إضافة</button></div></div>
                <div class="settings-card"><h3><i class="fas fa-flag" style="color:var(--success);"></i> حالات المتابعة</h3><div id="followList"></div><div class="settings-add"><input type="text" id="newFollow" placeholder="حالة متابعة جديدة"><button class="btn btn-primary" id="addFollowBtn"><i class="fas fa-plus"></i> إضافة</button></div></div>
            </div>
        </div>
    </div>

    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="text-align:center; margin-bottom:16px; font-size:var(--font-md);"><i class="fas fa-user-plus" style="color:var(--primary);"></i> إضافة عميل جديد</h3>
            <input type="hidden" id="editId">
            <div class="form-group"><label>الاسم <span class="required">*</span></label><input type="text" id="custName" placeholder="أدخل اسم العميل"></div>
            <div class="form-group"><label>الموبايل <span class="required">*</span></label><input type="text" id="custPhone" placeholder="أدخل رقم الموبايل"></div>
            <div class="form-group"><label>تاريخ الطلب</label><input type="date" id="custDate"></div>
            <div class="form-group"><label>تاريخ التواصل <span style="color:var(--text-light); font-size:0.68rem;">(افتراضي: بعد 3 أيام)</span></label><input type="date" id="custContactDate"></div>
            <div class="form-group"><label>المخزن</label><div class="multi-select-container" id="modalStoreMultiSelect"><div class="multi-select-display" id="modalStoreDisplay"><span style="color:var(--text-light);">اختر المخازن</span></div><div class="multi-select-dropdown" id="modalStoreDropdown"></div></div></div>
            <div class="form-group"><label>حالة المتابعة</label><select id="custFollow"></select></div>
            <div class="form-group"><label>ملاحظات</label><textarea id="custNotes" rows="2" placeholder="أدخل ملاحظات..."></textarea></div>
            <div id="editOnlyFields" style="display:none;"><div class="form-group"><label>التقييم</label><select id="custRating"></select></div><div class="form-group"><label>عدد مرات التواصل</label><input type="number" id="custContact" value="0" min="0"></div></div>
            <div class="flex-btns"><button class="btn btn-outline" id="closeModalBtn"><i class="fas fa-times"></i> إلغاء</button><button class="btn btn-primary" id="saveCustomerBtn"><i class="fas fa-save"></i> حفظ</button></div>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <i class="fas fa-exclamation-triangle" style="font-size:2.8rem; color:var(--warning); margin-bottom:14px;"></i>
            <h3>تأكيد الحذف</h3><p style="color:var(--text-secondary); margin:6px 0;">هل أنت متأكد من حذف هذا العميل؟</p>
            <p style="font-size:0.72rem; color:var(--danger);">لا يمكن التراجع عن هذا الإجراء</p>
            <div class="flex-btns" style="justify-content:center;"><button class="btn btn-outline" id="cancelDeleteBtn"><i class="fas fa-times"></i> إلغاء</button><button class="btn btn-danger" id="confirmDeleteBtn"><i class="fas fa-trash-alt"></i> نعم، احذف</button></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            'use strict';
            const DATA_VERSION = '5.0',
                STORAGE_KEY = 'crm_v6_ultimate';
            if (localStorage.getItem(STORAGE_KEY)) { try { let p = JSON.parse(localStorage.getItem(STORAGE_KEY)); if (!p
                        ._version || p._version !== DATA_VERSION || !Array.isArray(p.customers)) { localStorage.removeItem(
                        STORAGE_KEY); } } catch (e) { localStorage.removeItem(STORAGE_KEY); } }
            let settings = { stores: ["محسن الختامي", "مخزن القاهرة", "مخزن الإسكندرية"], ratings: ["جيد جداً", "جيد", "متوسط",
                    "في انتظار الرد"
                ], followStatuses: ["جديد", "قيد المتابعة", "تم التواصل", "مغلق"] };

            function getDefaultContactDate(d) { if (!d) return ''; let dt = new Date(d);
                dt.setDate(dt.getDate() + 3); return dt.toISOString().slice(0, 10); }
            let customers = [{ id: "1", name: "أحمد محمد", phone: "01001234567", date: "2026-04-20", contactDate: getDefaultContactDate(
                    "2026-04-20"), stores: ["محسن الختامي"], follow: "تم التواصل", rating: "جيد جداً", notes: "عميل ممتاز",
                contact: 3 }, { id: "2", name: "سارة علي", phone: "01112345678", date: "2026-04-21", contactDate: getDefaultContactDate(
                    "2026-04-21"), stores: ["مخزن القاهرة"], follow: "قيد المتابعة", rating: "جيد", notes: "", contact: 1 }, { id: "3",
                name: "محمد إبراهيم", phone: "01223456789", date: "2026-04-22", contactDate: getDefaultContactDate(
                    "2026-04-22"), stores: ["محسن الختامي", "مخزن القاهرة"], follow: "جديد", rating: "في انتظار الرد",
                notes: "يحتاج متابعة", contact: 0 } ];
            let nextId = 4,
                mainFilters = { stores: [], follow: "", rating: "", dateFrom: "", dateTo: "" },
                reportFilters = { store: "", follow: "", rating: "", dateFrom: "", dateTo: "" },
                charts = {},
                deleteId = null,
                modalSelectedStores = [],
                columnWidths = {};
            let columnOrder = [{ key: 'name', label: 'الاسم', type: 'text', defaultWidth: '120px' }, { key: 'phone',
                label: 'الموبايل', type: 'text', defaultWidth: '110px' }, { key: 'date', label: 'تاريخ الطلب', type: 'date',
                defaultWidth: '105px' }, { key: 'contactDate', label: 'تاريخ التواصل', type: 'date', defaultWidth: '105px' },
            { key: 'stores', label: 'المخزن', type: 'multi-select', optionsKey: 'stores', defaultWidth: '140px' }, { key: 'follow',
                label: 'المتابعة', type: 'select', optionsKey: 'followStatuses', defaultWidth: '110px' }, { key: 'rating',
                label: 'التقييم', type: 'select', optionsKey: 'ratings', prefix: '⭐ ', defaultWidth: '105px' }, { key: 'notes',
                label: 'ملاحظات', type: 'text', defaultWidth: '130px' }, { key: 'contact', label: 'عدد مرات التواصل', type: 'number',
                width: '65px', defaultWidth: '80px' }, { key: 'whatsapp', label: 'واتساب', type: 'whatsapp',
            defaultWidth: '55px' }, { key: 'actions', label: 'إجراءات', type: 'actions', defaultWidth: '70px' } ];
            const followColors = { "جديد": "#6366f1", "قيد المتابعة": "#f59e0b", "تم التواصل": "#10b981", "مغلق": "#ef4444" },
                ratingColors = { "جيد جداً": "#10b981", "جيد": "#6366f1", "متوسط": "#f59e0b", "في انتظار الرد": "#ef4444" },
                storeColorsArr = ["#6366f1", "#8b5cf6", "#06b6d4", "#10b981", "#f59e0b", "#ef4444", "#ec4899", "#f97316"];

            function saveData() { try { let data = { _version: DATA_VERSION, customers, settings, columnOrder, nextId,
                        columnWidths };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {} }

            function loadData() { let d = localStorage.getItem(STORAGE_KEY); if (d) { try { let p = JSON.parse(d);
                        customers = p.customers || customers;
                        settings = p.settings || settings;
                        columnOrder = p.columnOrder || columnOrder;
                        nextId = p.nextId || 4;
                        columnWidths = p.columnWidths || {}; } catch (e) {} } }

            function toast(m, t = "success") { let c = document.getElementById("toastContainer"),
                    e = document.createElement("div");
                e.className = `toast toast-${t}`;
                e.innerHTML = `<i class="fas fa-${t==='success'?'check-circle':'exclamation-circle'}"></i> ${m}`;
                c.appendChild(e);
                setTimeout(() => { e.style.opacity = '0';
                    e.style.transform = 'translateX(-100px)';
                    e.style.transition = 'all 0.3s ease';
                    setTimeout(() => { if (e.parentNode) e.parentNode.removeChild(e); }, 300); }, 2800); }

            function validatePhone(p) { let n = p.replace(/[^0-9]/g, ''); return n.length >= 10 && n.length <= 12; }

            function escapeHtml(s) { if (!s) return ""; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(
                    />/g, '&gt;'); }

            function getFiltered(filters) { return customers.filter(c => { if (filters.stores && filters.stores.length > 0 &&
                        (!c.stores || !c.stores.some(s => filters.stores.includes(s)))) return false; if (filters.store && (!c
                        .stores || !c.stores.includes(filters.store))) return false; if (filters.follow && c.follow !== filters
                    .follow) return false; if (filters.rating && c.rating !== filters.rating) return false; if (filters
                    .dateFrom && c.date < filters.dateFrom) return false; if (filters.dateTo && c.date > filters.dateTo)
                    return false; return true; }); }

            function getStoreColor(s) { let idx = settings.stores.indexOf(s); return idx >= 0 && idx < storeColorsArr.length ?
                    storeColorsArr[idx] : '#6366f1'; }

            function renderStatsStrip() { let f = getFiltered(mainFilters),
                    total = f.length; let fc = {},
                    rc = {};
                settings.followStatuses.forEach(s => fc[s] = 0);
                settings.ratings.forEach(r => rc[r] = 0);
                f.forEach(c => { if (fc[c.follow] !== undefined) fc[c.follow]++; if (rc[c.rating] !== undefined) rc[c.rating]++; });
                let followHTML = settings.followStatuses.map(s => { let color = followColors[s] || '#6366f1',
                        count = fc[s] || 0,
                        active = mainFilters.follow === s; return `<div class="mini-chip ${active?'active':''}" style="border-color:${color}; ${active?'background:'+color+';':''}" data-filter="follow" data-value="${escapeHtml(s)}"><span class="mini-dot" style="background:${active?'white':color};"></span> ${s} <span class="mini-count">(${count})</span></div>`; })
                    .join(''); let ratingHTML = settings.ratings.map(r => { let color = ratingColors[r] || '#6366f1',
                        count = rc[r] || 0,
                        active = mainFilters.rating === r; return `<div class="mini-chip ${active?'active':''}" style="border-color:${color}; ${active?'background:'+color+';':''}" data-filter="rating" data-value="${escapeHtml(r)}"><span class="mini-dot" style="background:${active?'white':color};"></span> ⭐ ${r} <span class="mini-count">(${count})</span></div>`; })
                    .join(''); let totalCard =
                    `<div class="mini-chip" style="border-color:#6366f1; background:rgba(99,102,241,0.08); cursor:default;"><i class="fas fa-users" style="color:#6366f1; font-size:0.65rem;"></i> إجمالي العملاء <span class="mini-count" style="font-weight:700; color:#6366f1;">(${total})</span></div>`;
                document.getElementById("statsStrip").innerHTML =
                    `<div class="strip-section">${totalCard} ${followHTML}</div><div class="strip-divider"></div><div class="strip-section">${ratingHTML}</div>`;
                document.querySelectorAll('#statsStrip .mini-chip[data-filter]').forEach(chip => { chip.addEventListener(
                        'click', function() { let ft = this.getAttribute('data-filter'),
                                fv = this.getAttribute('data-value'); if (ft === 'follow') { mainFilters.follow =
                                    mainFilters.follow === fv ? '' : fv;
                                document.getElementById('filterFollowSelect').value = mainFilters.follow; } else if (
                                ft === 'rating') { mainFilters.rating = mainFilters.rating === fv ? '' : fv;
                                document.getElementById('filterRatingSelect').value = mainFilters.rating; }
                            renderStatsStrip();
                            renderTable();
                            renderStoreDropdown(); }); }); }

            function renderStoreDropdown() { let f = getFiltered(mainFilters),
                    sc = {};
                f.forEach(c => { (c.stores || []).forEach(s => sc[s] = (sc[s] || 0) + 1); });
                document.getElementById("storeDropdown").innerHTML = settings.stores.map(s => { let checked = mainFilters
                        .stores.includes(s) ? 'checked' : '',
                        count = sc[s] || 0; return `<label class="multi-select-option"><input type="checkbox" value="${escapeHtml(s)}" ${checked} onchange="window._toggleStore('${escapeHtml(s)}', this.checked)"> ${escapeHtml(s)} <span style="color:var(--text-light); font-size:0.68rem; margin-right:auto;">(${count})</span></label>`; })
                    .join('');
                updateStoreDisplay(); }

            function updateStoreDisplay() { let display = document.getElementById("storeDisplay"); if (!mainFilters.stores
                    .length) { display.innerHTML = '<span style="color:var(--text-light);">كل المخازن</span>'; } else { display
                    .innerHTML = mainFilters.stores.map(s => { let color = getStoreColor(s); return `<span class="multi-select-tag" style="background:${color}; box-shadow:0 2px 8px ${color}30;">${escapeHtml(s)} <span class="remove-tag" onclick="event.stopPropagation(); window._toggleStore('${escapeHtml(s)}', false)">&times;</span></span>`; })
                    .join(''); } }
            window._toggleStore = function(store, checked) { if (checked) { if (!mainFilters.stores.includes(store))
                    mainFilters.stores.push(store); } else { mainFilters.stores = mainFilters.stores.filter(s => s !== store); }
                updateStoreDisplay();
                renderStoreDropdown();
                applyMainFilters(); };

            function toggleStoreDropdown(e) { e.stopPropagation();
                document.getElementById("storeDropdown").classList.toggle("show");
                renderStoreDropdown(); }

            function renderModalStoreDropdown() { let dropdown = document.getElementById("modalStoreDropdown"); if (!dropdown)
                    return;
                dropdown.innerHTML = settings.stores.map(opt => { let checked = modalSelectedStores.includes(opt) ?
                        'checked' : '',
                        color = getStoreColor(opt); return `<label class="multi-select-option"><input type="checkbox" value="${escapeHtml(opt)}" ${checked} onchange="window._modalStoreToggle('${escapeHtml(opt)}', this.checked)"> <span style="color:${color}; font-weight:600;">${escapeHtml(opt)}</span></label>`; })
                    .join('');
                updateModalStoreDisplay(); }

            function updateModalStoreDisplay() { let display = document.getElementById("modalStoreDisplay"); if (!display)
                    return; if (modalSelectedStores.length === 0) { display.innerHTML =
                        '<span style="color:var(--text-light);">اختر المخازن</span>'; } else { display.innerHTML =
                        modalSelectedStores.map(s => { let color = getStoreColor(s); return `<span class="multi-select-tag" style="background:${color}; box-shadow:0 2px 8px ${color}30;">${escapeHtml(s)} <span class="remove-tag" onclick="event.stopPropagation(); window._modalStoreRemove('${escapeHtml(s)}')">&times;</span></span>`; })
                        .join(''); } }
            window._modalStoreToggle = function(value, checked) { if (checked) { if (!modalSelectedStores.includes(value))
                    modalSelectedStores.push(value); } else { modalSelectedStores = modalSelectedStores.filter(s => s !==
                    value); }
                updateModalStoreDisplay();
                renderModalStoreDropdown(); };
            window._modalStoreRemove = function(value) { modalSelectedStores = modalSelectedStores.filter(s => s !== value);
                updateModalStoreDisplay();
                renderModalStoreDropdown(); };

            function renderMainFilters() { let sel = id => document.getElementById(id);
                sel("filterFollowSelect").innerHTML = '<option value="">كل الحالات</option>' + settings.followStatuses.map(s =>
                    `<option value="${escapeHtml(s)}" ${mainFilters.follow===s?'selected':''}>${escapeHtml(s)}</option>`).join(
                    '');
                sel("filterRatingSelect").innerHTML = '<option value="">كل التقييمات</option>' + settings.ratings.map(s =>
                    `<option value="${escapeHtml(s)}" ${mainFilters.rating===s?'selected':''}>${escapeHtml(s)}</option>`).join(
                    '');
                sel("filterDateFrom").value = mainFilters.dateFrom;
                sel("filterDateTo").value = mainFilters.dateTo;
                renderStoreDropdown(); }

            function applyMainFilters() { mainFilters.follow = document.getElementById("filterFollowSelect").value;

                    .join('');
                document.getElementById("ratingsList").innerHTML = settings.ratings.map((r, i) =>
                    `<div class="settings-item"><span><i class="fas fa-star" style="color:var(--warning);"></i> <span style="font-weight:700;">${escapeHtml(r)}</span></span><div style="display:flex;gap:4px;"><button class="btn btn-outline" style="padding:4px 10px;font-size:0.65rem;" onclick="editItem('ratings',${i})"><i class="fas fa-edit"></i> تعديل</button><button class="btn btn-outline" style="padding:4px 10px;font-size:0.65rem;color:var(--danger);" onclick="deleteItem('ratings',${i})"><i class="fas fa-trash-alt"></i> حذف</button></div></div>`
                    ).join('');
                document.getElementById("followList").innerHTML = settings.followStatuses.map((f, i) => { let color =
                        followColors[f] || '#6366f1'; return `<div class="settings-item"><span><i class="fas fa-flag" style="color:${color};"></i> <span style="font-weight:700;">${escapeHtml(f)}</span></span><div style="display:flex;gap:4px;"><button class="btn btn-outline" style="padding:4px 10px;font-size:0.65rem;" onclick="editItem('followStatuses',${i})"><i class="fas fa-edit"></i> تعديل</button><button class="btn btn-outline" style="padding:4px 10px;font-size:0.65rem;color:var(--danger);" onclick="deleteItem('followStatuses',${i})"><i class="fas fa-trash-alt"></i> حذف</button></div></div>`; })
                    .join(''); }
            window.editItem = function(arr, i) { let v = prompt("القيمة الجديدة:", settings[arr][i]); if (v && v.trim() && v
                    .trim() !== settings[arr][i]) { let old = settings[arr][i],
                        nv = v.trim();
                    settings[arr][i] = nv; let field = arr === 'stores' ? 'stores' : arr === 'ratings' ? 'rating' : 'follow';
                    customers.forEach(c => { if (field === 'stores' && c.stores) { let idx = c.stores.indexOf(old); if (idx !==
                            -1) c.stores[idx] = nv; } else if (c[field] === old) c[field] = nv; });
                    saveData();
                    renderSettings();
                    renderMainFilters();
                    renderStatsStrip();
                    renderTable();
                    toast("✅ تم التعديل بنجاح"); } };
            window.deleteItem = function(arr, i) { if (settings[arr].length <= 1) { toast("❌ لا يمكن حذف آخر عنصر",
                "error"); return; } let val = settings[arr][i],
                    fallback = settings[arr].find((v, idx) => idx !== i); if (confirm(
                        `حذف "${val}"؟\nسيتم تحويل المرتبطين إلى "${fallback}"`)) { settings[arr].splice(i, 1); let field =
                        arr === 'stores' ? 'stores' : arr === 'ratings' ? 'rating' : 'follow';
                    customers.forEach(c => { if (field === 'stores' && c.stores) { c.stores = c.stores.map(s => s === val ?
                            fallback : s); } else if (c[field] === val) c[field] = fallback; });
                    saveData();
                    renderSettings();
                    renderMainFilters();
                    renderStatsStrip();
                    renderTable();
                    toast("✅ تم الحذف بنجاح"); } };

            function addItem(arr, inputId) { let v = document.getElementById(inputId).value.trim(); if (v) { if (settings[arr]
                        .includes(v)) { toast("❌ موجود بالفعل", "error"); return; }
                    settings[arr].push(v);
                    document.getElementById(inputId).value = "";
                    saveData();
                    renderSettings();
                    renderMainFilters();
                    renderStatsStrip();
                    renderTable();
                    toast("✅ تمت الإضافة بنجاح"); } }

            function showPage(page) { ["mainPage", "reportsPage", "settingsPage"].forEach(id => document.getElementById(id)
                    .style.display = id === page + 'Page' ? 'block' : 'none');
                document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active")); if (page === 'main') { document
                        .getElementById("homeNavBtn").classList.add("active");
                    renderMainFilters();
                    renderStatsStrip();
                    renderTableHead();
                    renderTable(); } if (page === 'reports') { document.getElementById("reportsNavBtn").classList.add(
                    "active");
                    renderReports(); } if (page === 'settings') { document.getElementById("settingsNavBtn").classList.add(
                    "active");
                    renderSettings(); } }
            document.getElementById("homeNavBtn").onclick = () => showPage('main');
            document.getElementById("reportsNavBtn").onclick = () => showPage('reports');
            document.getElementById("settingsNavBtn").onclick = () => showPage('settings');
            document.getElementById("darkModeBtn").onclick = () => { document.body.classList.toggle("dark"); let isDark =
                    document.body.classList.contains("dark");
                localStorage.setItem("dark_mode", isDark);
                document.getElementById("darkModeBtn").querySelector('i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
                Object.values(charts).forEach(c => { try { c.destroy(); } catch (e) {} });
                charts = {}; if (document.getElementById("reportsPage").style.display !== 'none') renderReportsData(); };
            document.getElementById("backFromReports").onclick = () => { Object.values(charts).forEach(c => { try { c
                        .destroy(); } catch (e) {} });
                showPage('main'); };
            document.getElementById("backFromSettings").onclick = () => showPage('main');
            document.getElementById("addCustomerBtn").onclick = () => { document.getElementById("modalTitle").innerHTML =
                    '<i class="fas fa-user-plus" style="color:var(--primary);"></i> إضافة عميل جديد';
                document.getElementById("editId").value = "";
                ["custName", "custPhone", "custNotes", "custContactDate"].forEach(id => document.getElementById(id).value =
                    ""); let today = new Date().toISOString().slice(0, 10);
                document.getElementById("custDate").value = today;
                document.getElementById("custContactDate").value = getDefaultContactDate(today);
                document.getElementById("custFollow").innerHTML = settings.followStatuses.map(f =>
                    `<option>${escapeHtml(f)}</option>`).join('');
                modalSelectedStores = [];
                renderModalStoreDropdown();
                document.getElementById("editOnlyFields").style.display = "none";
                document.getElementById("customerModal").style.display = "flex"; };
            document.getElementById("saveCustomerBtn").onclick = saveCustomer;
            document.getElementById("closeModalBtn").onclick = () => document.getElementById("customerModal").style.display =
                "none";
            document.getElementById("confirmDeleteBtn").onclick = deleteCustomer;
            document.getElementById("cancelDeleteBtn").onclick = () => document.getElementById("confirmModal").style.display =
                "none";
            document.getElementById("importExcelBtn").onclick = importExcel;
            document.getElementById("exportExcel").onclick = exportExcel;
            document.getElementById("exportPDFBtn").onclick = () => { toast("📄 جاري تجهيز PDF...");
                setTimeout(() => window.print(), 400); };
            document.getElementById("clearFiltersBtn").onclick = () => { mainFilters = { stores: [], follow: "", rating: "",
                    dateFrom: "", dateTo: "" };
                document.getElementById("searchInput").value = "";
                ["filterFollowSelect", "filterRatingSelect", "filterDateFrom", "filterDateTo"].forEach(id => document
                    .getElementById(id).value = "");
                updateStoreDisplay();
                renderMainFilters();
                renderStatsStrip();
                renderTable();
                toast("✅ تم إعادة ضبط الفلاتر"); };
            document.getElementById("searchInput").oninput = () => { renderTable();
                renderStatsStrip(); };
            document.getElementById("filterFollowSelect").onchange = applyMainFilters;
            document.getElementById("filterRatingSelect").onchange = applyMainFilters;
            document.getElementById("filterDateFrom").onchange = applyMainFilters;
            document.getElementById("filterDateTo").onchange = applyMainFilters;
            document.getElementById("reportStoreFilter").onchange = applyReportFilters;
            document.getElementById("reportFollowFilter").onchange = applyReportFilters;
            document.getElementById("reportRatingFilter").onchange = applyReportFilters;
            document.getElementById("reportDateFrom").onchange = applyReportFilters;
            document.getElementById("reportDateTo").onchange = applyReportFilters;
            document.getElementById("resetReportFiltersBtn").onclick = resetReportFilters;
            document.getElementById("addStoreBtn").onclick = () => addItem('stores', 'newStore');
            document.getElementById("addRatingBtn").onclick = () => addItem('ratings', 'newRating');
            document.getElementById("addFollowBtn").onclick = () => addItem('followStatuses', 'newFollow');
            ["newStore", "newRating", "newFollow"].forEach(id => document.getElementById(id).addEventListener("keypress",
                function(e) { if (e.key === "Enter") { let arr = id === "newStore" ? "stores" : id === "newRating" ?
                            "ratings" : "followStatuses";
                        addItem(arr, id); } }));
            document.getElementById("storeDisplay").addEventListener("click", toggleStoreDropdown);
            document.getElementById("modalStoreDisplay").addEventListener("click", function(e) { e.stopPropagation();
                document.getElementById("modalStoreDropdown").classList.toggle("show");
                renderModalStoreDropdown(); });
            document.getElementById("custDate").addEventListener("change", function() { let contactDateInput = document
                    .getElementById("custContactDate"); if (this.value && !contactDateInput.value) { contactDateInput.value =
                        getDefaultContactDate(this.value); } });
            document.addEventListener("click", function(e) { let storeContainer = document.getElementById("storeMultiSelect");
                let modalStoreContainer = document.getElementById("modalStoreMultiSelect"); if (storeContainer && !storeContainer
                    .contains(e.target)) document.getElementById("storeDropdown").classList.remove("show"); if (
                    modalStoreContainer && !modalStoreContainer.contains(e.target)) document.getElementById(
                    "modalStoreDropdown").classList.remove("show"); });
            window.onclick = (e) => { if (e.target.classList.contains("modal")) e.target.style.display = "none"; };
            document.addEventListener("keydown", (e) => { if (e.key === "Escape") document.querySelectorAll(".modal").forEach(
                    m => m.style.display = "none"); if (e.ctrlKey && e.key === "f") { e.preventDefault();
                    document.getElementById("searchInput").focus(); } if (e.ctrlKey && e.key === "n") { e.preventDefault();
                    document.getElementById("addCustomerBtn").click(); } });
            if (localStorage.getItem("dark_mode") === "true") { document.body.classList.add("dark");
                document.getElementById("darkModeBtn").querySelector('i').className = 'fas fa-sun'; }
            loadData();
            showPage('main');
            console.log('🚀 نظام متابعة العملاء V6 Ultimate | النسخة الاحترافية');
        })();
    </script>
</body>
</html>
