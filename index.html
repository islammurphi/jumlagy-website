<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جملجي ERB - نظام إدارة الصيانة والمخزون</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .logo {
            background: white;
            display: inline-block;
            padding: 20px 40px;
            border-radius: 60px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .logo h1 {
            color: #4f46e5;
            font-size: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #1f2937;
            margin-bottom: 15px;
        }
        
        .card p {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            font-family: inherit;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: #4f46e5;
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        
        .btn-google {
            background: white;
            color: #374151;
            border: 1px solid #d1d5db;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        
        .btn-google:hover {
            background: #f3f4f6;
        }
        
        .divider {
            position: relative;
            text-align: center;
            margin: 20px 0;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            right: 0;
            left: 0;
            height: 1px;
            background: #e5e7eb;
        }
        
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #9ca3af;
            font-size: 0.8rem;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #374151;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f3f4f6;
            border-radius: 12px;
            padding: 5px;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #4f46e5;
            color: white;
        }
        
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.85rem;
        }
        
        .success-msg {
            background: #d1fae5;
            color: #065f46;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.85rem;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #6b7280;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .feature {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 12px;
            min-width: 100px;
        }
        
        .feature span {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .footer {
            margin-top: 25px;
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
        }
    </style>
    
    <!-- Firebase SDK -->
    <script type="module">
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
            authDomain: "jumlagy-website.firebaseapp.com",
            projectId: "jumlagy-website",
            storageBucket: "jumlagy-website.firebasestorage.app",
            messagingSenderId: "208078790740",
            appId: "1:208078790740:web:a569e9249689268c264dc1",
            measurementId: "G-M8B5PX17B5"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        // عناصر DOM
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const loading = document.getElementById('loading');
        
        let currentTab = 'login';
        
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 4000);
        }
        
        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }
        
        function setLoading(isLoading) {
            loading.style.display = isLoading ? 'block' : 'none';
        }
        
        // تبديل التبويبات
        loginTab.addEventListener('click', () => {
            currentTab = 'login';
            loginTab.classList.add('active');
            registerTab.classList.remove('active');
            loginForm.style.display = 'block';
            registerForm.style.display = 'none';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        });
        
        registerTab.addEventListener('click', () => {
            currentTab = 'register';
            registerTab.classList.add('active');
            loginTab.classList.remove('active');
            loginForm.style.display = 'none';
            registerForm.style.display = 'block';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        });
        
        // تسجيل الدخول بالبريد وكلمة المرور
        document.getElementById('loginEmailBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            
            setLoading(true);
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'dashboard.html';
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    showError('لا يوجد حساب بهذا البريد الإلكتروني');
                } else if (error.code === 'auth/wrong-password') {
                    showError('كلمة المرور غير صحيحة');
                } else {
                    showError(error.message);
                }
            } finally {
                setLoading(false);
            }
        });
        
        // إنشاء حساب جديد
        document.getElementById('registerEmailBtn').addEventListener('click', async () => {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            if (!name || !email || !password) {
                showError('الرجاء إدخال جميع البيانات');
                return;
            }
            
            if (password.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            setLoading(true);
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                localStorage.setItem('userName', name);
                showSuccess('تم إنشاء الحساب بنجاح! جاري التحويل...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    showError('هذا البريد الإلكتروني مستخدم بالفعل');
                } else {
                    showError(error.message);
                }
            } finally {
                setLoading(false);
            }
        });
        
        // تسجيل الدخول بـ Google
        document.getElementById('googleLogin').addEventListener('click', async () => {
            setLoading(true);
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        });
        
        document.getElementById('googleRegister')?.addEventListener('click', async () => {
            setLoading(true);
            try {
                await signInWithPopup(auth, provider);
                window.location.href = 'dashboard.html';
            } catch (error) {
                showError(error.message);
            } finally {
                setLoading(false);
            }
        });
        
        // التحقق من حالة المستخدم
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>جملجي ERB</h1>
    </div>
    
    <div class="card">
        <div class="tabs">
            <div class="tab active" id="loginTab">تسجيل دخول</div>
            <div class="tab" id="registerTab">حساب جديد</div>
        </div>
        
        <div id="errorMsg" class="error-msg" style="display: none;"></div>
        <div id="successMsg" class="success-msg" style="display: none;"></div>
        
        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="loginEmail" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" id="loginEmailBtn">دخول</button>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <button class="btn btn-google" id="googleLogin">
                🔵 تسجيل الدخول بـ Google
            </button>
        </div>
        
        <!-- نموذج إنشاء حساب -->
        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <input type="text" id="registerName" placeholder="أدخل اسمك">
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="registerEmail" placeholder="example@domain.com">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="registerPassword" placeholder="6 أحرف على الأقل">
            </div>
            <button class="btn btn-primary" id="registerEmailBtn">إنشاء حساب</button>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <button class="btn btn-google" id="googleRegister">
                🔵 إنشاء حساب بـ Google
            </button>
        </div>
        
        <div id="loading" class="loading">
            جاري المعالجة...
        </div>
        
        <div class="features">
            <div class="feature">
                <span>🔧</span>
                أوامر الصيانة
            </div>
            <div class="feature">
                <span>📦</span>
                إدارة المخزون
            </div>
            <div class="feature">
                <span>📉</span>
                المصاريف
            </div>
        </div>
    </div>
    
    <div class="footer">
        جملجي ERB © 2026 - نظام إدارة الصيانة والمخزون
    </div>
</div>

</body>
</html>
