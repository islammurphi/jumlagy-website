<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>جملجي ERB - نظام متكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
            authDomain: "jumlagy-website.firebaseapp.com",
            projectId: "jumlagy-website",
            storageBucket: "jumlagy-website.firebasestorage.app",
            messagingSenderId: "208078790740",
            appId: "1:208078790740:web:a569e9249689268c264dc1",
            measurementId: "G-M8B5PX17B5"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.auth = auth;
        window.signInWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error(error);
                alert("فشل تسجيل الدخول: " + error.message);
            }
        };
        window.logout = async () => {
            await signOut(auth);
            location.reload();
        };
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1e2f);
            direction: rtl;
            min-height: 100vh;
        }
        /* شاشة تسجيل الدخول */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            width: 360px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-card h1 { color: white; margin-bottom: 20px; font-size: 28px; }
        .login-card p { color: #cbd5e1; margin-bottom: 30px; }
        .google-btn {
            background: white;
            color: #1f2937;
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        /* لوحة التحكم */
        .dashboard-container { display: none; }
        .app-container { display: flex; }
        .sidebar {
            width: 280px;
            background: rgba(15,23,42,0.8);
            backdrop-filter: blur(12px);
            height: 100vh;
            position: fixed;
            right: 0;
            padding: 24px;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header { margin-bottom: 32px; }
        .sidebar-header h2 { color: white; font-size: 24px; }
        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: #cbd5e1;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .main-content {
            margin-right: 280px;
            padding: 24px;
            width: 100%;
        }
        .top-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .date { color: #94a3b8; }
        .user-info { display: flex; align-items: center; gap: 16px; }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
        }
        .stat-card h3 { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: white; }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h3 { margin-bottom: 20px; color: white; }
        .order-item {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-sm {
            padding: 6px 14px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            background: #3b82f6;
            color: white;
        }
        .page { display: none; }
        .page.active-page { display: block; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); }
            .main-content { margin-right: 0; }
        }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h1>جملجي ERB</h1>
        <p>سجل دخولك بحساب Google للمتابعة</p>
        <button class="google-btn" onclick="window.signInWithGoogle()">
            <i class="fab fa-google"></i> Continue with Google
        </button>
    </div>
</div>

<!-- لوحة التحكم -->
<div id="dashboardScreen" class="dashboard-container">
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>جملجي ERB</h2>
                <p style="color:#94a3b8; font-size:12px;">نظام إدارة متكامل</p>
            </div>
            <div class="nav-item active" data-page="dashboard">📊 لوحة التحكم</div>
            <div class="nav-item" data-page="repair">🔧 أوامر الصيانة</div>
            <div class="nav-item" data-page="inventory">📦 المخزون</div>
            <div class="nav-item" data-page="expenses">💰 المصروفات</div>
            <div class="nav-item" data-page="customers">👥 العملاء</div>
            <div class="nav-item" data-page="reports">📈 التقارير</div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div class="date" id="currentDate"></div>
                <div class="user-info">
                    <span id="userName"></span>
                    <button class="logout-btn" onclick="window.logout()">تسجيل خروج</button>
                </div>
            </div>

            <div id="dashboardPage" class="page active-page">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="card">
                    <h3>📋 آخر أوامر الصيانة</h3>
                    <div id="recentOrders"></div>
                </div>
            </div>

            <div id="repairPage" class="page">
                <div class="card">
                    <h3>🔧 أوامر الصيانة</h3>
                    <button onclick="addSampleOrder()" class="btn-sm">+ إضافة أمر صيانة</button>
                    <div id="repairList" style="margin-top: 16px;"></div>
                </div>
            </div>

            <div id="inventoryPage" class="page">
                <div class="card">
                    <h3>📦 قطع الغيار</h3>
                    <button onclick="addSamplePart()" class="btn-sm">+ إضافة قطعة غيار</button>
                    <div id="partsList" style="margin-top: 16px;"></div>
                </div>
            </div>

            <div id="expensesPage" class="page">
                <div class="card">
                    <h3>💰 المصروفات</h3>
                    <button onclick="addSampleExpense()" class="btn-sm">+ إضافة مصروف</button>
                    <div id="expensesList" style="margin-top: 16px;"></div>
                </div>
            </div>

            <div id="customersPage" class="page">
                <div class="card">
                    <h3>👥 العملاء</h3>
                    <button onclick="addSampleCustomer()" class="btn-sm">+ إضافة عميل</button>
                    <div id="customersList" style="margin-top: 16px;"></div>
                </div>
            </div>

            <div id="reportsPage" class="page">
                <div class="card">
                    <h3>📊 التقارير</h3>
                    <div id="reportsContent">سيتم إضافة التقارير قريباً</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let repairOrders = JSON.parse(localStorage.getItem('repairOrders')) || [];
    let spareParts = JSON.parse(localStorage.getItem('spareParts')) || [];
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let customers = JSON.parse(localStorage.getItem('customers')) || [];

    if(repairOrders.length===0) repairOrders.push({ id:1, customer:"أحمد محمد", device:"iPhone 12", price:55, date:"2025-04-20", status:"قيد الصيانة" });
    if(expenses.length===0) expenses.push({ id:1, title:"إيجار المحل", amount:9075, date:"2025-04-01" });
    if(spareParts.length===0) spareParts.push({ id:1, name:"شاشة iPhone", buyPrice:150, sellPrice:300, qty:12 });
    if(customers.length===0) customers.push({ id:1, name:"أحمد محمد", phone:"01001234567" });

    function saveAll(){
        localStorage.setItem('repairOrders', JSON.stringify(repairOrders));
        localStorage.setItem('spareParts', JSON.stringify(spareParts));
        localStorage.setItem('expenses', JSON.stringify(expenses));
        localStorage.setItem('customers', JSON.stringify(customers));
        renderAll();
    }

    function renderAll(){
        const totalRevenue = repairOrders.reduce((s,o)=>s+o.price,0);
        const totalExpenses = expenses.reduce((s,e)=>s+e.amount,0);
        const profit = totalRevenue - totalExpenses;
        const inventoryValue = spareParts.reduce((s,p)=>s+(p.sellPrice*p.qty),0);
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>💰 الإيرادات</h3><div class="value">${totalRevenue} ج.م</div></div>
            <div class="stat-card"><h3>📉 المصروفات</h3><div class="value">${totalExpenses} ج.م</div></div>
            <div class="stat-card"><h3>📈 الأرباح</h3><div class="value">${profit} ج.م</div></div>
            <div class="stat-card"><h3>📦 قيمة المخزون</h3><div class="value">${inventoryValue} ج.م</div></div>
        `;
        document.getElementById('recentOrders').innerHTML = repairOrders.slice(0,5).map(o=>`<div class="order-item"><div><strong>${o.customer}</strong> - ${o.device} - ${o.price} ج.م</div><div>${o.status}</div></div>`).join('');
        document.getElementById('repairList').innerHTML = repairOrders.map(o=>`<div class="order-item"><div><strong>${o.customer}</strong> - ${o.device} - ${o.price} ج.م</div><div><button onclick="deleteOrder(${o.id})" class="btn-sm">حذف</button></div></div>`).join('');
        document.getElementById('partsList').innerHTML = spareParts.map(p=>`<div class="order-item"><div>${p.name} - ${p.sellPrice} ج.م - الكمية: ${p.qty}</div><div><button onclick="deletePart(${p.id})" class="btn-sm">حذف</button></div></div>`).join('');
        document.getElementById('expensesList').innerHTML = expenses.map(e=>`<div class="order-item"><div>${e.title} - ${e.amount} ج.م</div><div><button onclick="deleteExpense(${e.id})" class="btn-sm">حذف</button></div></div>`).join('');
        document.getElementById('customersList').innerHTML = customers.map(c=>`<div class="order-item"><div>${c.name} - ${c.phone}</div><div><button onclick="deleteCustomer(${c.id})" class="btn-sm">حذف</button></div></div>`).join('');
    }

    window.addSampleOrder = () => {
        repairOrders.push({ id:Date.now(), customer:"عميل جديد", device:"جهاز جديد", price:120, date:new Date().toISOString().slice(0,10), status:"قيد الصيانة" });
        saveAll();
    };
    window.addSamplePart = () => {
        spareParts.push({ id:Date.now(), name:"قطعة جديدة", buyPrice:50, sellPrice:120, qty:8 });
        saveAll();
    };
    window.addSampleExpense = () => {
        expenses.push({ id:Date.now(), title:"مصروف جديد", amount:250, date:new Date().toISOString().slice(0,10) });
        saveAll();
    };
    window.addSampleCustomer = () => {
        customers.push({ id:Date.now(), name:"عميل جديد", phone:"01111111111" });
        saveAll();
    };
    window.deleteOrder = (id) => { repairOrders = repairOrders.filter(o=>o.id!=id); saveAll(); };
    window.deletePart = (id) => { spareParts = spareParts.filter(p=>p.id!=id); saveAll(); };
    window.deleteExpense = (id) => { expenses = expenses.filter(e=>e.id!=id); saveAll(); };
    window.deleteCustomer = (id) => { customers = customers.filter(c=>c.id!=id); saveAll(); };

    let pages = ['dashboard','repair','inventory','expenses','customers','reports'];
    window.showPage = (page) => {
        pages.forEach(p=>document.getElementById(p+'Page').classList.remove('active-page'));
        document.getElementById(page+'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');
    };
    document.querySelectorAll('.nav-item').forEach(nav=>{
        nav.addEventListener('click',()=>{
            let pg = nav.getAttribute('data-page');
            showPage(pg);
        });
    });

    window.auth.onAuthStateChanged((user) => {
        if(user){
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG');
            renderAll();
        } else {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').style.display = 'none';
        }
    });
</script>
</body>
</html>
