<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جملجي ERB - نظام إدارة الصيانة والمخزون</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        .login-container { max-width: 450px; width: 100%; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: white; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .logo p { color: rgba(255,255,255,0.8); margin-top: 8px; font-size: 0.85rem; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            text-align: center;
        }
        .card h2 { color: #1f2937; margin-bottom: 10px; font-size: 1.6rem; }
        .card p { color: #6b7280; margin-bottom: 28px; font-size: 0.9rem; }
        .btn-google {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 14px 20px;
            border-radius: 16px;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
        }
        .btn-google:hover { background: #f9fafb; border-color: #d1d5db; transform: translateY(-2px); }
        .features { display: flex; justify-content: center; gap: 20px; margin-top: 32px; flex-wrap: wrap; }
        .feature { text-align: center; }
        .feature-icon { font-size: 1.8rem; margin-bottom: 6px; }
        .feature-text { font-size: 0.75rem; color: #6b7280; }
        .footer { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.6); font-size: 0.7rem; }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .loading { display: none; margin-top: 20px; }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
            authDomain: "jumlagy-website.firebaseapp.com",
            projectId: "jumlagy-website",
            storageBucket: "jumlagy-website.firebasestorage.app",
            messagingSenderId: "208078790740",
            appId: "1:208078790740:web:a569e9249689268c264dc1",
            measurementId: "G-M8B5PX17B5"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        
        async function signInWithGoogle() {
            loading.style.display = 'block';
            errorMsg.style.display = 'none';
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                localStorage.setItem('userName', user.displayName || user.email.split('@')[0]);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userAvatar', user.photoURL || '');
                window.location.href = 'dashboard.html';
            } catch (error) {
                errorMsg.textContent = 'حدث خطأ، حاول مرة أخرى';
                errorMsg.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }
        
        document.getElementById('googleLogin').addEventListener('click', signInWithGoogle);
        
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });
    </script>
</head>
<body>
    <div class="login-container">
        <div class="logo"><h1>جملجي ERB</h1><p>نظام إدارة الصيانة والمخزون</p></div>
        <div class="card">
            <h2>مرحباً بك</h2>
            <p>سجل دخولك باستخدام حساب Google</p>
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            <button class="btn-google" id="googleLogin"><span>🟡</span> تسجيل الدخول بـ Google</button>
            <div id="loading" class="loading"><div class="spinner"></div><div style="margin-top: 10px;">جاري الاتصال...</div></div>
            <div class="features">
                <div class="feature"><div class="feature-icon">🔧</div><div class="feature-text">أوامر الصيانة</div></div>
                <div class="feature"><div class="feature-icon">📦</div><div class="feature-text">المخزون</div></div>
                <div class="feature"><div class="feature-icon">📊</div><div class="feature-text">التقارير</div></div>
            </div>
        </div>
        <div class="footer">جملجي ERB © 2026</div>
    </div>
</body>
</html>
