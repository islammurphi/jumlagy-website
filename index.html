<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جملجي ERB - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
            authDomain: "jumlagy-website.firebaseapp.com",
            projectId: "jumlagy-website",
            storageBucket: "jumlagy-website.firebasestorage.app",
            messagingSenderId: "208078790740",
            appId: "1:208078790740:web:a569e9249689268c264dc1",
            measurementId: "G-M8B5PX17B5"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        window.auth = auth;
        window.signInWithGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error(error);
                alert("فشل تسجيل الدخول: " + error.message);
            }
        };
        window.logout = async () => {
            await signOut(auth);
            localStorage.clear();
            location.reload();
        };
        
        window.checkUserAccess = (user) => {
            if(!user && !localStorage.getItem("demoMode")) {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboardScreen').style.display = 'none';
                return false;
            }
            return true;
        };
    </script>
    <style>
        :root {
            --primary: #2563eb;
            --card: #1e293b;
            --text: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a);
            color: var(--text);
            direction: rtl;
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            width: 350px;
        }
        .login-card h1 { margin-bottom: 20px; }
        .btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .btn:hover { opacity: 0.8; }
        .dashboard-container { display: none; }
        .sidebar {
            width: 260px;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
        }
        .sidebar-header { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            color: #cbd5e1;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .main-content { margin-right: 260px; padding: 24px; }
        .top-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px 24px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
        }
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }
        button { font-family: inherit; cursor: pointer; }
        .btn-sm { padding: 6px 12px; font-size: 12px; margin: 5px; background: var(--primary); color: white; border: none; border-radius: 20px; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h1>🔧 جملجي ERB</h1>
        <p>نظام إدارة الورش</p>
        <button class="btn" id="demoLoginBtn">🚀 دخول تجريبي (مدير)</button>
        <button class="btn" id="googleLoginBtn" style="background:#db4437;">🔐 تسجيل دخول Google</button>
    </div>
</div>

<!-- لوحة التحكم -->
<div id="dashboardScreen" class="dashboard-container">
    <div class="sidebar">
        <div class="sidebar-header"><h2><i class="fas fa-tools"></i> جملجي ERB</h2></div>
        <div class="nav-item active" data-page="dashboard">📊 لوحة التحكم</div>
        <div class="nav-item" data-page="repair">🔧 أوامر الصيانة</div>
        <div class="nav-item" data-page="inventory">📦 المخزون</div>
        <div class="nav-item" data-page="expenses">💰 المصروفات</div>
        <div class="nav-item" data-page="customers">👥 العملاء</div>
        <div class="nav-item" data-page="reports">📈 التقارير</div>
        <div class="nav-item" data-page="settings">⚙️ الإعدادات</div>
    </div>
    <div class="main-content">
        <div class="top-bar">
            <div class="date" id="currentDate"></div>
            <div><span id="userName">مدير النظام</span> <button id="logoutBtn" class="btn-sm" style="background:#ef4444;">خروج</button></div>
        </div>

        <div id="dashboardPage" class="page active-page">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="card"><h3>📋 آخر أوامر الصيانة</h3><div id="recentOrders"></div></div>
        </div>
        <div id="repairPage" class="page"><div class="card"><h3>🔧 أوامر الصيانة</h3><button onclick="addSampleOrder()" class="btn-sm">+ أمر جديد</button><div id="repairList"></div></div></div>
        <div id="inventoryPage" class="page"><div class="card"><h3>📦 قطع الغيار</h3><button onclick="addSamplePart()" class="btn-sm">+ قطعة غيار</button><div id="partsList"></div></div></div>
        <div id="expensesPage" class="page"><div class="card"><h3>💰 المصروفات</h3><button onclick="addSampleExpense()" class="btn-sm">+ مصروف</button><div id="expensesList"></div></div></div>
        <div id="customersPage" class="page"><div class="card"><h3>👥 العملاء</h3><button onclick="addSampleCustomer()" class="btn-sm">+ عميل</button><div id="customersList"></div></div></div>
        <div id="reportsPage" class="page"><div class="card"><h3>📊 التقارير</h3><div id="reportsContent">سيتم إضافة التقارير قريباً</div></div></div>
        <div id="settingsPage" class="page"><div class="card"><h3>⚙️ الإعدادات</h3><div>إعدادات النظام</div></div></div>
    </div>
</div>

<script>
    // بيانات تجريبية
    let repairOrders = JSON.parse(localStorage.getItem('repairOrders')) || [];
    let spareParts = JSON.parse(localStorage.getItem('spareParts')) || [];
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let customers = JSON.parse(localStorage.getItem('customers')) || [];

    if(repairOrders.length===0) repairOrders.push({ id:1, customer:"أحمد محمد", device:"iPhone 12", price:55, date:"2025-04-20", status:"pending" });
    if(expenses.length===0) expenses.push({ id:1, title:"إيجار المحل", amount:9075, date:"2025-04-01" });
    if(spareParts.length===0) spareParts.push({ id:1, name:"شاشة iPhone", category:"شاشات", buyPrice:150, sellPrice:300, qty:12 });
    if(customers.length===0) customers.push({ id:1, name:"أحمد محمد", phone:"01001234567", points:0 });

    function saveAll(){
        localStorage.setItem('repairOrders', JSON.stringify(repairOrders));
        localStorage.setItem('spareParts', JSON.stringify(spareParts));
        localStorage.setItem('expenses', JSON.stringify(expenses));
        localStorage.setItem('customers', JSON.stringify(customers));
        renderAll();
    }

    function renderAll(){
        const totalRevenue = repairOrders.reduce((s,o)=>s+o.price,0);
        const totalExpenses = expenses.reduce((s,e)=>s+e.amount,0);
        const profit = totalRevenue - totalExpenses;
        const inventoryValue = spareParts.reduce((s,p)=>s+(p.sellPrice*p.qty),0);
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>💰 الإيرادات</h3><div>${totalRevenue} ج.م</div></div>
            <div class="stat-card"><h3>📉 المصروفات</h3><div>${totalExpenses} ج.م</div></div>
            <div class="stat-card"><h3>📈 الأرباح</h3><div>${profit} ج.م</div></div>
            <div class="stat-card"><h3>📦 قيمة المخزون</h3><div>${inventoryValue} ج.م</div></div>
        `;
        document.getElementById('recentOrders').innerHTML = repairOrders.slice(0,5).map(o=>`<div style="background:#1e293b; margin:10px 0; padding:10px; border-radius:12px;"><strong>${o.customer}</strong> - ${o.device} - ${o.price} ج.م <span style="color:#facc15;">${o.status}</span></div>`).join('');
        document.getElementById('repairList').innerHTML = repairOrders.map(o=>`<div style="background:#1e293b; margin:10px 0; padding:10px; border-radius:12px;"><strong>${o.customer}</strong> - ${o.device} - ${o.price} ج.م <button onclick="deleteOrder(${o.id})" class="btn-sm">حذف</button></div>`).join('');
        document.getElementById('partsList').innerHTML = spareParts.map(p=>`<div style="background:#1e293b; margin:10px 0; padding:10px;">${p.name} - سعر: ${p.sellPrice} - كمية: ${p.qty} <button onclick="deletePart(${p.id})" class="btn-sm">حذف</button></div>`).join('');
        document.getElementById('expensesList').innerHTML = expenses.map(e=>`<div style="background:#1e293b; margin:10px 0; padding:10px;">${e.title} - ${e.amount} ج.م <button onclick="deleteExpense(${e.id})" class="btn-sm">حذف</button></div>`).join('');
        document.getElementById('customersList').innerHTML = customers.map(c=>`<div style="background:#1e293b; margin:10px 0; padding:10px;">${c.name} - ${c.phone} - نقاط: ${c.points} <button onclick="deleteCustomer(${c.id})" class="btn-sm">حذف</button></div>`).join('');
    }

    window.addSampleOrder = () => {
        repairOrders.push({ id:Date.now(), customer:"عميل جديد", device:"جهاز جديد", price:100, date:new Date().toISOString().slice(0,10), status:"pending" });
        saveAll();
    };
    window.addSamplePart = () => {
        spareParts.push({ id:Date.now(), name:"قطعة جديدة", category:"أخرى", buyPrice:50, sellPrice:100, qty:5 });
        saveAll();
    };
    window.addSampleExpense = () => {
        expenses.push({ id:Date.now(), title:"مصروف جديد", amount:200, date:new Date().toISOString().slice(0,10) });
        saveAll();
    };
    window.addSampleCustomer = () => {
        customers.push({ id:Date.now(), name:"عميل جديد", phone:"0111111111", points:0 });
        saveAll();
    };
    window.deleteOrder = (id) => { repairOrders = repairOrders.filter(o=>o.id!=id); saveAll(); };
    window.deletePart = (id) => { spareParts = spareParts.filter(p=>p.id!=id); saveAll(); };
    window.deleteExpense = (id) => { expenses = expenses.filter(e=>e.id!=id); saveAll(); };
    window.deleteCustomer = (id) => { customers = customers.filter(c=>c.id!=id); saveAll(); };

    let pages = ['dashboard','repair','inventory','expenses','customers','reports','settings'];
    window.showPage = (page) => {
        pages.forEach(p=>document.getElementById(p+'Page').classList.remove('active-page'));
        document.getElementById(page+'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');
    };
    document.querySelectorAll('.nav-item').forEach(nav=>{
        nav.addEventListener('click',()=>{
            let pg = nav.getAttribute('data-page');
            showPage(pg);
        });
    });

    window.demoLogin = () => {
        localStorage.setItem("demoMode","true");
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG');
        renderAll();
    };
    window.logout = () => {
        localStorage.removeItem("demoMode");
        window.auth.signOut();
        document.getElementById('dashboardScreen').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
    };
    document.getElementById('demoLoginBtn').addEventListener('click', demoLogin);
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        await window.signInWithGoogle();
    });
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG');

    // التحقق من حالة Firebase عند تحميل الصفحة
    window.auth.onAuthStateChanged((user) => {
        if(user && !localStorage.getItem("demoMode")) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
            renderAll();
        } else if(!localStorage.getItem("demoMode")) {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboardScreen').style.display = 'none';
        }
    });
</script>
</body>
</html>
