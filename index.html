<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جملجي ERB - نظام إدارة الصيانة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        .logo {
            background: white;
            display: inline-block;
            padding: 20px 40px;
            border-radius: 60px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .logo h1 {
            color: #4f46e5;
            font-size: 2.5rem;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #1f2937;
            margin-bottom: 20px;
        }
        
        .card p {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #4f46e5;
            color: white;
            border: none;
        }
        
        .btn-primary:hover {
            background: #4338ca;
            transform: translateY(-2px);
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .feature {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 12px;
            min-width: 100px;
        }
        
        .feature span {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .footer {
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <h1>جملجي ERB</h1>
    </div>
    
    <div class="card">
        <h2>نظام إدارة الصيانة والمخزون</h2>
        <p>نظام متكامل لإدارة أوامر الصيانة، قطع الغيار، والمصاريف التشغيلية لورشة الهواتف المحمولة</p>
        
        <a href="dashboard.html" class="btn btn-primary">🚀 الدخول إلى النظام</a>
        
        <div class="features">
            <div class="feature">
                <span>🔧</span>
                أوامر الصيانة
            </div>
            <div class="feature">
                <span>📦</span>
                إدارة المخزون
            </div>
            <div class="feature">
                <span>📉</span>
                المصاريف
            </div>
        </div>
    </div>
    
    <div class="footer">
        جملجي ERB © 2026 - جميع الحقوق محفوظة
    </div>
</div>

</body>
</html>
