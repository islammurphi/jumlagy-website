<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جملجي ERB - نظام إدارة الصيانة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 20px;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo p {
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .card h2 {
            color: #1f2937;
            margin-bottom: 15px;
        }
        
        .card p {
            color: #6b7280;
            margin-bottom: 30px;
        }
        
        .btn-google {
            background: white;
            color: #374151;
            border: 1px solid #e5e7eb;
            padding: 14px 20px;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .btn-google:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            transform: translateY(-2px);
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .feature {
            text-align: center;
            padding: 15px;
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 0.8rem;
            color: #6b7280;
        }
        
        .footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.7);
            font-size: 0.75rem;
        }
        
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
            color: #6b7280;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    
    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
            authDomain: "jumlagy-website.firebaseapp.com",
            projectId: "jumlagy-website",
            storageBucket: "jumlagy-website.firebasestorage.app",
            messagingSenderId: "208078790740",
            appId: "1:208078790740:web:a569e9249689268c264dc1",
            measurementId: "G-M8B5PX17B5"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loading');
        
        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 4000);
        }
        
        async function signInWithGoogle() {
            loading.style.display = 'block';
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                localStorage.setItem('userName', user.displayName || user.email.split('@')[0]);
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error(error);
                if (error.code === 'auth/popup-closed-by-user') {
                    showError('تم إغلاق نافذة التسجيل، حاول مرة أخرى');
                } else {
                    showError('حدث خطأ، حاول مرة أخرى');
                }
            } finally {
                loading.style.display = 'none';
            }
        }
        
        document.getElementById('googleLogin').addEventListener('click', signInWithGoogle);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>جملجي ERB</h1>
            <p>نظام إدارة الصيانة والمخزون</p>
        </div>
        
        <div class="card">
            <h2>مرحباً بك</h2>
            <p>سجل دخولك باستخدام حساب Google للمتابعة</p>
            
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
            
            <button class="btn-google" id="googleLogin">
                <span style="font-size: 1.2rem;">🟡</span>
                تسجيل الدخول بـ Google
            </button>
            
            <div id="loading" class="loading">
                <div class="spinner"></div>
                جاري الاتصال بـ Google...
            </div>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">🔧</div>
                    <div class="feature-text">أوامر الصيانة</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📦</div>
                    <div class="feature-text">إدارة المخزون</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📉</div>
                    <div class="feature-text">المصاريف</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">📊</div>
                    <div class="feature-text">تقارير</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            جملجي ERB © 2026 - جميع الحقوق محفوظة
        </div>
    </div>
</body>
</html>
