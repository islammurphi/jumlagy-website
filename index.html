<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جملجي ERB - النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        /* شاشة تسجيل الدخول */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #020617);
        }
        .login-card {
            background: #020617;
            padding: 40px;
            border-radius: 20px;
            width: 360px;
            text-align: center;
            border: 1px solid #1e293b;
        }
        .google-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }
        /* التطبيق */
        .app { display: flex; }
        .sidebar {
            width: 260px;
            background: #020617;
            height: 100vh;
            position: fixed;
            right: 0;
            padding: 20px;
            border-left: 1px solid #1e293b;
        }
        .nav-item {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active {
            background: #1e293b;
        }
        .main-content {
            margin-right: 260px;
            padding: 20px;
            width: 100%;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            background: #020617;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .card {
            background: #020617;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #1e293b;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #020617;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #1e293b;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .value { font-size: 28px; font-weight: bold; }
        .btn-sm {
            background: #3b82f6;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .logout-btn {
            background: #ef4444;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .order-item {
            background: #020617;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border: 1px solid #1e293b;
        }
        .page { display: none; }
        .active-page { display: block; }
    </style>
</head>
<body>

<!-- شاشة تسجيل الدخول -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <h2>جملجي ERB</h2>
        <p style="margin:10px 0 20px;">سجل دخولك بحساب Google</p>
        <button class="google-btn" id="googleLoginBtn">
            <i class="fab fa-google"></i> Login with Google
        </button>
    </div>
</div>

<!-- لوحة التحكم -->
<div id="dashboard" style="display:none">
    <div class="app">
        <div class="sidebar">
            <h3 style="margin-bottom:20px;">جملجي ERB</h3>
            <div class="nav-item active" data-page="dashboard">📊 لوحة التحكم</div>
            <div class="nav-item" data-page="repair">🔧 أوامر الصيانة</div>
            <div class="nav-item" data-page="inventory">📦 المخزون</div>
            <div class="nav-item" data-page="expenses">💰 المصروفات</div>
            <div class="nav-item" data-page="customers">👥 العملاء</div>
            <div class="nav-item" data-page="reports">📈 التقارير</div>
            <div class="nav-item" id="subscriptionsNav" style="display:none" data-page="subscriptions">👑 الاشتراكات</div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div id="currentDate"></div>
                <div><span id="userName"></span> <button class="logout-btn" id="logoutBtn">خروج</button></div>
            </div>

            <div id="dashboardPage" class="page active-page">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="card">
                    <h3>آخر أوامر الصيانة</h3>
                    <div id="recentOrders"></div>
                </div>
            </div>

            <div id="repairPage" class="page">
                <div class="card">
                    <h3>🔧 أوامر الصيانة</h3>
                    <button class="btn-sm" onclick="addSampleOrder()">+ إضافة أمر صيانة</button>
                    <div id="repairList" style="margin-top:15px;"></div>
                </div>
            </div>

            <div id="inventoryPage" class="page">
                <div class="card">
                    <h3>📦 قطع الغيار</h3>
                    <button class="btn-sm" onclick="addSamplePart()">+ إضافة قطعة غيار</button>
                    <div id="partsList" style="margin-top:15px;"></div>
                </div>
            </div>

            <div id="expensesPage" class="page">
                <div class="card">
                    <h3>💰 المصروفات</h3>
                    <button class="btn-sm" onclick="addSampleExpense()">+ إضافة مصروف</button>
                    <div id="expensesList" style="margin-top:15px;"></div>
                </div>
            </div>

            <div id="customersPage" class="page">
                <div class="card">
                    <h3>👥 العملاء</h3>
                    <button class="btn-sm" onclick="addSampleCustomer()">+ إضافة عميل</button>
                    <div id="customersList" style="margin-top:15px;"></div>
                </div>
            </div>

            <div id="reportsPage" class="page">
                <div class="card">
                    <h3>📈 التقارير</h3>
                    <div id="reportsContent" style="color:#94a3b8;">جاري إعداد التقارير المتقدمة</div>
                </div>
            </div>

            <div id="subscriptionsPage" class="page">
                <div class="card">
                    <h3>👑 إدارة الاشتراكات</h3>
                    <div id="usersList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
        authDomain: "jumlagy-website.firebaseapp.com",
        projectId: "jumlagy-website",
        storageBucket: "jumlagy-website.firebasestorage.app",
        messagingSenderId: "208078790740",
        appId: "1:208078790740:web:a569e9249689268c264dc1"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app);
    
    const ADMIN_EMAIL = "islammurphi@gmail.com";
    
    // ======================== بيانات التطبيق ========================
    let repairOrders = JSON.parse(localStorage.getItem('repairOrders')) || [];
    let spareParts = JSON.parse(localStorage.getItem('spareParts')) || [];
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let customers = JSON.parse(localStorage.getItem('customers')) || [];
    
    if(repairOrders.length===0) repairOrders.push({ id:1, customer:"أحمد محمد", device:"iPhone 12", price:550, date:"2025-04-20", status:"قيد الصيانة" });
    if(expenses.length===0) expenses.push({ id:1, title:"إيجار المحل", amount:5000, date:"2025-04-01" });
    if(spareParts.length===0) spareParts.push({ id:1, name:"شاشة iPhone", sellPrice:450, qty:8 });
    if(customers.length===0) customers.push({ id:1, name:"أحمد محمد", phone:"01001234567" });
    
    function saveAll(){
        localStorage.setItem('repairOrders', JSON.stringify(repairOrders));
        localStorage.setItem('spareParts', JSON.stringify(spareParts));
        localStorage.setItem('expenses', JSON.stringify(expenses));
        localStorage.setItem('customers', JSON.stringify(customers));
        renderAll();
    }
    
    function renderAll(){
        const totalRevenue = repairOrders.reduce((s,o)=>s+o.price,0);
        const totalExpenses = expenses.reduce((s,e)=>s+e.amount,0);
        const profit = totalRevenue - totalExpenses;
        const inventoryValue = spareParts.reduce((s,p)=>s+(p.sellPrice*p.qty),0);
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><h3>💰 الإيرادات</h3><div class="value">${totalRevenue} ج.م</div></div>
            <div class="stat-card"><h3>📉 المصروفات</h3><div class="value">${totalExpenses} ج.م</div></div>
            <div class="stat-card"><h3>📈 الأرباح</h3><div class="value">${profit} ج.م</div></div>
            <div class="stat-card"><h3>📦 قيمة المخزون</h3><div class="value">${inventoryValue} ج.م</div></div>
        `;
        document.getElementById('recentOrders').innerHTML = repairOrders.slice(0,5).map(o=>`<div class="order-item"><div><strong>${o.customer}</strong> - ${o.device} - ${o.price} ج.م</div><div>${o.status}</div></div>`).join('');
        document.getElementById('repairList').innerHTML = repairOrders.map(o=>`<div class="order-item"><div><strong>${o.customer}</strong> - ${o.device} - ${o.price}</div><button class="btn-sm" onclick="deleteOrder(${o.id})">حذف</button></div>`).join('');
        document.getElementById('partsList').innerHTML = spareParts.map(p=>`<div class="order-item"><div>${p.name} - ${p.sellPrice} ج.م - كمية: ${p.qty}</div><button class="btn-sm" onclick="deletePart(${p.id})">حذف</button></div>`).join('');
        document.getElementById('expensesList').innerHTML = expenses.map(e=>`<div class="order-item"><div>${e.title} - ${e.amount} ج.م</div><button class="btn-sm" onclick="deleteExpense(${e.id})">حذف</button></div>`).join('');
        document.getElementById('customersList').innerHTML = customers.map(c=>`<div class="order-item"><div>${c.name} - ${c.phone}</div><button class="btn-sm" onclick="deleteCustomer(${c.id})">حذف</button></div>`).join('');
    }
    
    window.addSampleOrder = () => {
        repairOrders.push({ id:Date.now(), customer:"عميل جديد", device:"جهاز جديد", price:200, date:new Date().toISOString().slice(0,10), status:"قيد الصيانة" });
        saveAll();
    };
    window.addSamplePart = () => {
        spareParts.push({ id:Date.now(), name:"قطعة جديدة", sellPrice:100, qty:10 });
        saveAll();
    };
    window.addSampleExpense = () => {
        expenses.push({ id:Date.now(), title:"مصروف جديد", amount:300, date:new Date().toISOString().slice(0,10) });
        saveAll();
    };
    window.addSampleCustomer = () => {
        customers.push({ id:Date.now(), name:"عميل جديد", phone:"01111111111" });
        saveAll();
    };
    window.deleteOrder = (id) => { repairOrders = repairOrders.filter(o=>o.id!=id); saveAll(); };
    window.deletePart = (id) => { spareParts = spareParts.filter(p=>p.id!=id); saveAll(); };
    window.deleteExpense = (id) => { expenses = expenses.filter(e=>e.id!=id); saveAll(); };
    window.deleteCustomer = (id) => { customers = customers.filter(c=>c.id!=id); saveAll(); };
    
    // ======================== التنقل ========================
    let pages = ['dashboard','repair','inventory','expenses','customers','reports','subscriptions'];
    window.showPage = (page) => {
        pages.forEach(p=>document.getElementById(p+'Page').classList.remove('active-page'));
        document.getElementById(page+'Page').classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        document.querySelector(`[data-page="${page}"]`).classList.add('active');
    };
    document.querySelectorAll('.nav-item').forEach(nav=>{
        nav.addEventListener('click',()=>{
            let pg = nav.getAttribute('data-page');
            if(pg) showPage(pg);
        });
    });
    
    // ======================== تسجيل الدخول ========================
    async function loginSuccess(user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userName').innerText = user.displayName || user.email.split('@')[0];
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG');
        if(user.email === ADMIN_EMAIL) document.getElementById('subscriptionsNav').style.display = 'block';
        renderAll();
    }
    
    document.getElementById('googleLoginBtn').onclick = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            if(user.email !== ADMIN_EMAIL){
                const userRef = doc(db, "users", user.email);
                const userSnap = await getDoc(userRef);
                if(!userSnap.exists() || !userSnap.data().active){
                    window.location.href = "https://wa.me/201207696202";
                    return;
                }
            }
            loginSuccess(user);
        } catch(error) {
            alert("فشل تسجيل الدخول: " + error.message);
        }
    };
    
    document.getElementById('logoutBtn').onclick = async () => {
        await signOut(auth);
        location.reload();
    };
    
    onAuthStateChanged(auth, (user) => {
        if(user) loginSuccess(user);
    });
    
    // ======================== الاشتراكات ========================
    window.showSubs = async () => {
        showPage('subscriptions');
        const q = await getDocs(collection(db, "users"));
        let html = "";
        q.forEach(docu => {
            let d = docu.data();
            html += `<div class="order-item">
                        <div><b>${docu.id}</b><br>الحالة: ${d.active ? "✅ مفعل" : "❌ غير مفعل"}</div>
                        <div>
                            <button class="btn-sm" onclick="activateUser('${docu.id}')">تفعيل</button>
                            <button class="btn-sm" style="background:#ef4444;" onclick="deactivateUser('${docu.id}')">تعطيل</button>
                        </div>
                     </div>`;
        });
        document.getElementById('usersList').innerHTML = html;
    };
    window.activateUser = async (email) => {
        let days = prompt("عدد أيام الاشتراك:", 30);
        let end = Date.now() + (days * 24 * 60 * 60 * 1000);
        await setDoc(doc(db, "users", email), { active: true, endDate: end });
        showSubs();
    };
    window.deactivateUser = async (email) => {
        await setDoc(doc(db, "users", email), { active: false });
        showSubs();
    };
    
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ar-EG');
</script>
</body>
</html>
