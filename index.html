<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ERB PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Cairo;background:#f5f7fb;display:flex}

/* SIDEBAR */
.sidebar{width:220px;background:#fff;padding:20px}
.sidebar button{display:block;width:100%;margin-bottom:10px;padding:10px}

/* MAIN */
.main{flex:1;padding:20px}

/* LOGIN */
.login,.blocked{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
background:#00000090;
}
.login-box{
background:#fff;padding:40px;border-radius:12px;text-align:center
}

.btn{
background:#2563eb;color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer
}

.blocked{display:none;background:#fff;color:#000;text-align:center}

.user-card{
background:#fff;padding:15px;margin:10px 0;border-radius:10px
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="login-box">
<h2>تسجيل الدخول</h2><br>
<button class="btn" onclick="login()">تسجيل الدخول بجوجل</button>
</div>
</div>

<!-- BLOCK -->
<div class="blocked" id="blocked">
<div>
<h2>🚫 لا يوجد اشتراك</h2>
<p>يرجى التواصل لتفعيل الحساب</p><br>
<a href="https://wa.me/201207696202" target="_blank">
<button class="btn">واتساب</button>
</a>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="showPage('dashboard')">لوحة التحكم</button>
<button id="subsBtn" onclick="showPage('subs')" style="display:none">الاشتراكات</button>
</div>

<div class="main">

<h2 id="welcome"></h2>
<p id="daysLeft"></p>

<!-- DASHBOARD -->
<div id="dashboard">
<h3>اهلا بك في النظام</h3>
</div>

<!-- SUBSCRIPTIONS -->
<div id="subs" style="display:none">
<h3>إدارة الاشتراكات</h3>
<div id="usersList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1TNUM62Hckq-qFBRKZdOxz_VUPUd51uI",
  authDomain: "jumlagy-website.firebaseapp.com",
  projectId: "jumlagy-website",
  storageBucket: "jumlagy-website.firebasestorage.app",
  messagingSenderId: "208078790740",
  appId: "1:208078790740:web:a569e9249689268c264dc1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN = "islammurphi@gmail.com";

window.login = async function(){

    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    const email = user.email;

    document.getElementById("login").style.display="none";

    // ADMIN
    if(email === ADMIN){
        document.getElementById("welcome").innerText = "👑 مرحبا ادمن";
        document.getElementById("subsBtn").style.display="block";
        loadUsers();
        return;
    }

    // USER
    const ref = doc(db, "users", email);
    const snap = await getDoc(ref);

    if(!snap.exists()){
        await setDoc(ref,{active:false});
        document.getElementById("blocked").style.display="flex";
        return;
    }

    const data = snap.data();

    if(data.active){
        document.getElementById("welcome").innerText = "مرحبا " + email;

        if(data.endDate){
            let days = Math.ceil((data.endDate - Date.now())/(1000*60*60*24));
            document.getElementById("daysLeft").innerText = "متبقي " + days + " يوم";
        }

    }else{
        document.getElementById("blocked").style.display="flex";
    }
}

/* ADMIN FUNCTIONS */

async function loadUsers(){
    const q = await getDocs(collection(db,"users"));
    let html="";

    q.forEach(docu=>{
        let d=docu.data();

        html+=`
        <div class="user-card">
        <b>${docu.id}</b><br>
        الحالة: ${d.active ? "نشط" : "غير مفعل"}<br><br>

        <button onclick="activateUser('${docu.id}')">تفعيل</button>
        <button onclick="deactivateUser('${docu.id}')">إيقاف</button>
        </div>
        `;
    });

    document.getElementById("usersList").innerHTML=html;
}

window.activateUser = async function(email){
    let days = prompt("عدد الأيام",30);
    let end = Date.now() + (days*24*60*60*1000);

    await setDoc(doc(db,"users",email),{
        active:true,
        endDate:end
    });

    loadUsers();
}

window.deactivateUser = async function(email){
    await setDoc(doc(db,"users",email),{
        active:false
    });

    loadUsers();
}

/* UI */
window.showPage = function(p){
    document.getElementById("dashboard").style.display="none";
    document.getElementById("subs").style.display="none";
    document.getElementById(p).style.display="block";
}

</script>

</body>
</html>
